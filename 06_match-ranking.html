<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Match Ranking</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3d",
                        "surface-container": "#171f33",
                        "outline": "#8c909f",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#001a42",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#adc6ff",
                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#272a2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; }
        .ranking-container {
            position: absolute;
            right: 50px; top: 100px;
            width: 400px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .header {
            background: #ffb690;
            color: #552100;
            padding: 10px 20px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .ranking-row {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 12px;
            padding: 10px 15px;
            display: flex; align-items: center; gap: 15px;
            border-right: 4px solid transparent;
        }
        .ranking-row.top-3 { border-right-color: #ffb690; background: rgba(45, 52, 73, 0.95); }
        .rank-num { width: 30px; font-weight: 900; color: #ffb690; font-style: italic; text-align: center; }
        .team-logo { height: 30px; width: 30px; object-fit: contain; }
        .team-name { flex-grow: 1; font-weight: 700; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; color: #dae2fd; }
        .team-pts { font-weight: 900; color: #adc6ff; font-variant-numeric: tabular-nums; }
        @keyframes slideInLeft {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-rank { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div id="ranking" class="ranking-container shadow-2xl">
            <div class="header">
                <span>RANKINGS</span>
                <span class="material-symbols-outlined text-sm">trending_up</span>
            </div>
            <div id="rank-list">
                <!-- Top 10-16 injected here -->
            </div>
            <!-- Accents -->
            <div class="h-1 bg-secondary opacity-30 mt-2"></div>
        </div>
    </div>

    <script>
        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                let rankings = [];
                if (data.f1) {
                    rankings = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                } else {
                    const logos = ['titan', 'epic', 'aut', 'gs', 'abn', 'b4', 'titan', 'epic', 'aut', 'gs'];
                    for(let i=1; i<=10; i++) {
                        rankings.push({ rank: i, logo: logos[i-1], name: `TEAM ${logos[i-1].toUpperCase()}`, pts: 100 - i*5 });
                    }
                }

                const list = document.getElementById('rank-list');
                list.innerHTML = '';
                rankings.forEach((team, index) => {
                    const row = document.createElement('div');
                    row.className = `ranking-row animate-rank ${team.rank <= 3 ? 'top-3' : ''}`;
                    row.style.animationDelay = `${index * 0.05}s`;
                    
                    let logoPath = team.logo;
                    if (!logoPath.includes('/')) logoPath = 'team_logos/' + logoPath;
                    if (!logoPath.includes('.')) logoPath += '.png';

                    row.innerHTML = `
                        <div class="rank-num">${team.rank}</div>
                        <img src="${logoPath}" class="team-logo" onerror="this.style.opacity=0">
                        <span class="team-name">${team.name}</span>
                        <span class="team-pts">${team.pts}</span>
                    `;
                    list.appendChild(row);
                });
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() { document.getElementById('wrapper').style.opacity = '1'; }
        function stop() { document.getElementById('wrapper').style.opacity = '0'; }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Live Match Ranking",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "7", "webplayout": "7",
            "out": "manual", "dataformat": "json", "uicolor": "12",
            "DataFields": [
                { "field": "f1", "ftype": "textfield", "title": "JSON Data", "value": "[]" }
            ]
        };
    </script>
</body>
</html>
