<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Winner Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3d",
                        "surface-container": "#171f33",
                        "outline": "#8c909f",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#001a42",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#adc6ff",
                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#272a2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: transparent;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 1920px; height: 1080px;
        }
        #wrapper {
            opacity: 0;
            transition: opacity 1s ease;
        }
        .main-winner-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .winner-header {
            background: #ec6a06;
            color: #4a1c00;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 950;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 32px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }
        .winner-content {
            background: rgba(11, 19, 38, 0.9);
            backdrop-blur: 24px;
            padding: 60px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid #ec6a06;
            position: relative;
            overflow: hidden;
        }
        .glow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(236,106,6,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .winner-logo {
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .winner-stats {
            display: flex; gap: 40px;
        }
        .stat-box {
            display: flex; flex-direction: column; align-items: center;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes zoomIn {
            from { transform: translate(-50%, -40%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .animate-zoom-in {
            animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes shine {
            0% { transform: translateX(-150%) skewX(-15deg); }
            50% { transform: translateX(250%) skewX(-15deg); }
            100% { transform: translateX(250%) skewX(-15deg); }
        }
        .shine-element::after {
            content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(236,106,6,0.3), transparent);
            transform: skewX(-15deg); animation: shine 3s infinite; pointer-events: none; z-index: 20;
        }
        @keyframes winnerPulse {
            0% { box-shadow: 0 0 20px rgba(236,106,6,0.2); }
            50% { box-shadow: 0 0 100px rgba(236,106,6,0.8); }
            100% { box-shadow: 0 0 20px rgba(236,106,6,0.2); }
        }
        .winner-pulse { animation: winnerPulse 2s infinite; }
        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti { position: absolute; z-index: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div id="card" class="main-winner-card">
            <div class="winner-header">
                <div>WINNER WINNER CHICKEN DINNER</div>
                <div class="material-symbols-outlined text-4xl">celebration</div>
            </div>
            <div class="winner-content">
                <div class="glow-overlay"></div>
                <div class="flex items-center gap-12 z-10">
                    <div class="winner-logo animate-float">
                        <img id="f1" src="team_logos/titan.png" alt="" class="max-w-full max-h-full object-contain filter drop-shadow-[0_0_15px_rgba(236,106,6,0.3)]">
                    </div>
                    <div class="flex flex-col">
                        <span class="text-secondary text-lg font-black tracking-widest uppercase opacity-80 mb-2">CHAMPIONS</span>
                        <h1 id="f0" class="text-on-surface font-headline font-black text-8xl tracking-tight uppercase italic leading-none">TEAM TITANS</h1>
                    </div>
                </div>
                <!-- Mini Stats Center Right -->
                <div class="winner-stats z-10">
                    <div class="stat-box">
                        <span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-2">TOTAL KILLS</span>
                        <span id="f2" class="text-secondary font-headline font-black text-7xl">18</span>
                    </div>
                    <div class="stat-box">
                        <span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-2">POINTS</span>
                        <span id="f3" class="text-primary font-headline font-black text-7xl">33</span>
                    </div>
                </div>
            </div>
            <!-- Footer Accents -->
            <div class="h-2 bg-secondary opacity-40"></div>
        </div>
    </div>

    <script>
        let sheetInterval = null;
        let isAutoMode = false;
        let hasTriggeredWinner = false;

        function createConfetti() {
            const colors = ['#ec6a06', '#adc6ff', '#ffffff', '#ffb690'];
            for (let i = 0; i < 150; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.width = Math.random() * 12 + 6 + 'px';
                conf.style.height = Math.random() * 24 + 12 + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-50px';
                conf.style.opacity = Math.random() + 0.5;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                conf.style.animation = `fall ${duration}s linear ${delay}s infinite`;
                document.body.appendChild(conf);
            }
        }

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

                const response = await fetch(cleanUrl);
                const csvText = await response.text();
                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const lines = results.data;
                        if (lines.length < 2) return;

                        const teams = lines.slice(2, 27).map(cols => {
                            if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;
                            const pips = [cols[4], cols[5], cols[6], cols[7]].filter(c => c?.trim().toUpperCase() === 'TRUE').length;
                            return {
                                name: cols[1].trim(),
                                logo: cols[2]?.trim() || '',
                                kills: parseInt(cols[8]?.trim()) || 0,
                                rank: parseInt(cols[9]?.trim()) || 999,
                                total: parseInt(cols[10]?.trim()) || 0,
                                isAlive: pips > 0
                            };
                        }).filter(t => t !== null);

                        // Auto detection logic: Only trigger if exactly 1 team standing
                        const alive = teams.filter(t => t.isAlive);
                        if (alive.length === 1 && !hasTriggeredWinner) {
                            hasTriggeredWinner = true;
                            showWinner(alive[0]);
                        }
                    }
                });
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function showWinner(winner) {
            document.getElementById('f0').innerText = winner.name.toUpperCase();
            let path = winner.logo;
            if (!path.includes('/')) path = 'team_logos/' + path;
            if (!path.includes('.')) path += '.png';
            document.getElementById('f1').src = path;
            document.getElementById('f2').innerText = winner.kills;
            document.getElementById('f3').innerText = winner.total;

            const card = document.getElementById('card');
            card.className = "main-winner-card winner-pulse shine-element";
            void card.offsetWidth;
            card.classList.add('animate-zoom-in');

            createConfetti();
            document.getElementById('wrapper').style.opacity = '1';
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                
                if (data.f7 && data.f7.startsWith('http')) {
                    isAutoMode = true;
                    document.getElementById('wrapper').style.opacity = '0';
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 3500); // Poll faster 3.5s
                } else {
                    isAutoMode = false;
                    if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                    if (data.f1) {
                        let path = data.f1;
                        if (!path.includes('/')) path = 'team_logos/' + path;
                        if (!path.includes('.')) path += '.png';
                        document.getElementById('f1').src = path;
                    }
                    if (data.f2) document.getElementById('f2').innerText = data.f2;
                    if (data.f3) document.getElementById('f3').innerText = data.f3;
                }
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            if (!isAutoMode) {
                const card = document.getElementById('card');
                card.className = "main-winner-card winner-pulse shine-element";
                void card.offsetWidth;
                card.classList.add('animate-zoom-in');
                createConfetti();
                document.getElementById('wrapper').style.opacity = '1';
            }
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Winner Screen",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "15",
            "webplayout": "15",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "5",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f0", "ftype": "textfield", "title": "Team Name", "value": "TEAM TITANS" },
                { "field": "f1", "ftype": "textfield", "title": "Logo Asset", "value": "titan" },
                { "field": "f2", "ftype": "textfield", "title": "Kills", "value": "18" },
                { "field": "f3", "ftype": "textfield", "title": "Total Points", "value": "33" }
            ]
        };
    </script>
</body>
</html>
