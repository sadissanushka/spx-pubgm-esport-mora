<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Winner Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#adc6ff",
                        "secondary": "#ffb690",
                        "surface-dim": "#0b1326",
                        "surface-container": "#171f33",
                        "on-surface": "#dae2fd",
                        "secondary-container": "#ec6a06",
                        "on-secondary-container": "#4a1c00",
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: transparent;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 1920px; height: 1080px;
        }
        #wrapper {
            opacity: 0;
            transition: opacity 1s ease;
        }
        .main-winner-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .winner-header {
            background: #ec6a06;
            color: #4a1c00;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 950;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 32px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }
        .winner-content {
            background: rgba(11, 19, 38, 0.9);
            backdrop-blur: 24px;
            padding: 60px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid #ec6a06;
            position: relative;
            overflow: hidden;
        }
        .glow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(236,106,6,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .winner-logo {
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .winner-stats {
            display: flex; gap: 40px;
        }
        .stat-box {
            display: flex; flex-direction: column; align-items: center;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes zoomIn {
            from { transform: translate(-50%, -40%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .animate-zoom-in {
            animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div id="card" class="main-winner-card">
            <div class="winner-header">
                <div>WINNER WINNER CHICKEN DINNER</div>
                <div class="material-symbols-outlined text-4xl">celebration</div>
            </div>
            <div class="winner-content">
                <div class="glow-overlay"></div>
                <div class="flex items-center gap-12 z-10">
                    <div class="winner-logo animate-float">
                        <img id="f1" src="team_logos/titan.png" alt="" class="max-w-full max-h-full object-contain filter drop-shadow-[0_0_15px_rgba(236,106,6,0.3)]">
                    </div>
                    <div class="flex flex-col">
                        <span class="text-secondary text-lg font-black tracking-widest uppercase opacity-80 mb-2">CHAMPIONS</span>
                        <h1 id="f0" class="text-on-surface font-headline font-black text-8xl tracking-tight uppercase italic leading-none">TEAM TITANS</h1>
                    </div>
                </div>
                <!-- Mini Stats Center Right -->
                <div class="winner-stats z-10">
                    <div class="stat-box">
                        <span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-2">TOTAL KILLS</span>
                        <span id="f2" class="text-secondary font-headline font-black text-7xl">18</span>
                    </div>
                    <div class="stat-box">
                        <span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-2">POINTS</span>
                        <span id="f3" class="text-primary font-headline font-black text-7xl">33</span>
                    </div>
                </div>
            </div>
            <!-- Footer Accents -->
            <div class="h-2 bg-secondary opacity-40"></div>
        </div>
    </div>

    <script>
        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                if (data.f1) {
                    let path = data.f1;
                    if (!path.includes('/')) path = 'team_logos/' + path;
                    if (!path.includes('.')) path += '.png';
                    document.getElementById('f1').src = path;
                }
                if (data.f2) document.getElementById('f2').innerText = data.f2;
                if (data.f3) document.getElementById('f3').innerText = data.f3;
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
            const card = document.getElementById('card');
            card.classList.remove('animate-zoom-in');
            void card.offsetWidth;
            card.classList.add('animate-zoom-in');
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Winner Screen",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "15",
            "webplayout": "15",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "5",
            "DataFields": [
                { "field": "f0", "ftype": "textfield", "title": "Team Name", "value": "TEAM TITANS" },
                { "field": "f1", "ftype": "textfield", "title": "Logo Asset", "value": "titan" },
                { "field": "f2", "ftype": "textfield", "title": "Kills", "value": "18" },
                { "field": "f3", "ftype": "textfield", "title": "Total Points", "value": "33" }
            ]
        };
    </script>
</body>
</html>
