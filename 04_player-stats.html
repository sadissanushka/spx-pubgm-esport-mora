<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBGM Premium Player Stats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec6a06",
                        "secondary": "#ffb690",
                        "surface": "#0b1326",
                        "surface-variant": "#2d3449",
                        "on-surface": "#dae2fd",
                        "accent-blue": "#adc6ff",
                        "mvp-gold": "#FFD700"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        
        #wrapper { 
            opacity: 0; 
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1); 
            width: 100%; height: 100%; 
            position: relative;
        }

        /* ── BACKGROUND ACCENTS ── */
        .bg-shape {
            position: absolute;
            z-index: 1;
            background: linear-gradient(135deg, rgba(236,106,6,0.1) 0%, transparent 70%);
            clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
            transform: skewX(-15deg);
        }

        /* ── PLAYER SECTION (Left) ── */
        .player-visual {
            position: absolute;
            left: 0; top: 0;
            width: 900px; height: 1080px;
            z-index: 10;
        }
        .character-img {
            width: 100%; height: 100%;
            object-fit: contain;
            object-position: bottom left;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.8));
            transform: translateX(-100px);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #wrapper.play .character-img {
            transform: translateX(0);
            opacity: 1;
        }
        
        /* ── CONTENT SECTION (Right) ── */
        .content-section {
            position: absolute;
            right: 0; top: 0;
            width: 1100px; height: 1080px;
            background: linear-gradient(90deg, transparent 0%, rgba(11, 19, 38, 0.95) 20%);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 150px;
            padding-right: 150px;
            z-index: 5;
            transform: translateX(200px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
        }
        #wrapper.play .content-section {
            transform: translateX(0);
            opacity: 1;
        }

        /* ── STAT CARDS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 48px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 4px solid #ec6a06;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle at top right, rgba(236,106,6,0.1), transparent);
        }
        .stat-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-top: 8px;
            font-style: italic;
        }

        /* ── MVP BADGE ── */
        #mvp-badge {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            padding: 8px 24px;
            font-weight: 950;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            border-radius: 4px;
            display: none;
            align-items: center;
            gap: 8px;
            width: fit-content;
            margin-bottom: 16px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        }

        .highlight-glow {
            position: absolute;
            left: 100px; top: 20%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(236,106,6,0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(100px);
        }
    </style>
</head>
<body class="bg-transparent font-sans text-on-surface">
    <div id="wrapper">
        <!-- Background decorative shapes -->
        <div class="bg-shape w-[1000px] h-[1000px] top-[-100px] left-[-200px]"></div>
        <div class="highlight-glow"></div>

        <!-- Character Visual -->
        <div class="player-visual">
            <img id="f2" src="images/characters/1.png" class="character-img" alt="Player">
        </div>

        <!-- Content Section -->
        <div class="content-section">
            <div id="mvp-badge">
                <span class="material-symbols-outlined">stars</span>
                Match MVP
            </div>

            <div class="flex items-center gap-4 mb-2">
                <img id="team-logo" src="team_logos/titan.png" class="w-16 h-16 object-contain filter drop-shadow-lg" alt="">
                <div class="flex flex-col">
                    <span class="text-primary font-black tracking-[0.4em] uppercase text-sm opacity-80">PLAYER PROFILE</span>
                    <span id="f1" class="text-white font-black tracking-[0.1em] uppercase text-2xl">TEAM TITANS</span>
                </div>
            </div>

            <h1 id="f0" class="font-black text-[120px] uppercase italic tracking-tighter leading-[0.9] mb-8 text-white">TITAN_REX</h1>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">TOTAL KILLS</div>
                    <div id="f3" class="stat-value">45</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">TOTAL DAMAGE</div>
                    <div id="f4" class="stat-value">12,480</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">HEADSHOTS</div>
                    <div id="f5" class="stat-value">14</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">SURVIVAL TIME</div>
                    <div id="f6" class="stat-value">22:14</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">ASSISTS</div>
                    <div id="f7_assists" class="stat-value">12</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">ACCURACY</div>
                    <div id="f8" class="stat-value">34%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sheetInterval = null;

        async function fetchSheet(url, targetSlot, targetPlayerIndex) {
            try {
                let cleanUrl = url.trim();
                let docIdMatch = cleanUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (!docIdMatch) return;
                
                let docId = docIdMatch[1];
                
                // 1. Fetch "Inputs" sheet for Position/Rank
                let inputsUrl = `https://docs.google.com/spreadsheets/d/${docId}/gviz/tq?tqx=out:csv&sheet=Inputs`;
                const inputsRes = await fetch(inputsUrl);
                const inputsCsv = await inputsRes.text();
                
                // 2. Fetch "Teams" sheet for Player Names/Kills
                let teamsUrl = `https://docs.google.com/spreadsheets/d/${docId}/gviz/tq?tqx=out:csv&sheet=Teams`;
                const teamsRes = await fetch(teamsUrl);
                const teamsCsv = await teamsRes.text();

                if (inputsCsv.includes('<!DOCTYPE html>') || teamsCsv.includes('<!DOCTYPE html>')) return;

                const inputsResult = Papa.parse(inputsCsv, { skipEmptyLines: true });
                const teamsResult = Papa.parse(teamsCsv, { skipEmptyLines: true });

                const inputsLines = inputsResult.data;
                const teamsLines = teamsResult.data;

                // Find data for targetSlot
                const inputRow = inputsLines.find(cols => cols[0] == targetSlot);
                const teamRow = teamsLines.find(cols => cols[0] == targetSlot);

                if (!inputRow || !teamRow) return;

                const teamName = teamRow[1]?.trim() || '';
                const teamTag = teamRow[2]?.trim() || '';
                const rank = parseInt(inputRow[9]?.trim()) || 999; // Rank/Position in Inputs column J

                const pIdx = parseInt(targetPlayerIndex) - 1;
                if (pIdx < 0 || pIdx > 3) return;

                const playerName = teamRow[4 + pIdx]?.trim() || 'UNKNOWN';
                const playerKills = parseInt(teamRow[8 + pIdx]?.trim()) || 0;
                
                // MVP LOGIC: If Rank 1, find max kills in the team
                let isMVP = false;
                if (rank === 1) {
                    const k1 = parseInt(teamRow[8]) || 0;
                    const k2 = parseInt(teamRow[9]) || 0;
                    const k3 = parseInt(teamRow[10]) || 0;
                    const k4 = parseInt(teamRow[11]) || 0;
                    const maxKills = Math.max(k1, k2, k3, k4);
                    if (playerKills === maxKills && playerKills > 0) {
                        isMVP = true;
                    }
                }

                // Update UI
                document.getElementById('f0').innerText = playerName.toUpperCase();
                document.getElementById('f1').innerText = teamName.toUpperCase();
                document.getElementById('f3').innerText = playerKills;
                
                const mvpBadge = document.getElementById('mvp-badge');
                mvpBadge.style.display = isMVP ? 'flex' : 'none';

                let logoAsset = teamTag.toLowerCase() || teamName.split(' ')[0].toLowerCase();
                document.getElementById('team-logo').src = `team_logos/${logoAsset}.png`;

            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;

                if (data.f7 && data.f7.startsWith('http')) {
                    const slot = data.f9 || "1";
                    const pIdx = data.f10 || "1";
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7, slot, pIdx);
                    sheetInterval = setInterval(() => fetchSheet(data.f7, slot, pIdx), 5000);
                }

                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                if (data.f1) {
                    document.getElementById('f1').innerText = data.f1.toUpperCase();
                    let logo = data.f1.split(' ')[0].toLowerCase();
                    document.getElementById('team-logo').src = `team_logos/${logo}.png`;
                }
                if (data.f2) {
                    let path = data.f2;
                    if (!path.includes('/')) path = 'images/characters/' + path;
                    if (!path.includes('.')) path += '.png';
                    document.getElementById('f2').src = path;
                }
                
                ['f3', 'f4', 'f5', 'f6', 'f7_assists', 'f8'].forEach(field => {
                    const id = field === 'f7_assists' ? 'f7_assists' : field;
                    if (data[field]) document.getElementById(id).innerText = data[field];
                });
                
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            const wrapper = document.getElementById('wrapper');
            wrapper.style.opacity = '1';
            wrapper.classList.add('play');
        }

        function stop() {
            const wrapper = document.getElementById('wrapper');
            wrapper.style.opacity = '0';
            wrapper.classList.remove('play');
        }

        window.SPXGCTemplateDefinition = {
            "description": "Premium Player Stats Profile",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "13",
            "webplayout": "13",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "6",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f9", "ftype": "textfield", "title": "Team Slot Number", "value": "1" },
                { "field": "f10", "ftype": "textfield", "title": "Player Index (1-4)", "value": "1" },
                { "field": "f0", "ftype": "textfield", "title": "Player Name (Manual)", "value": "TITAN_REX" },
                { "field": "f1", "ftype": "textfield", "title": "Team Name (Manual)", "value": "TEAM TITANS" },
                { "field": "f2", "ftype": "textfield", "title": "Portrait ID", "value": "1" },
                { "field": "f3", "ftype": "textfield", "title": "Kills", "value": "45" },
                { "field": "f4", "ftype": "textfield", "title": "Damage", "value": "12,480" },
                { "field": "f5", "ftype": "textfield", "title": "Headshots", "value": "14" },
                { "field": "f6", "ftype": "textfield", "title": "Survival Time", "value": "22:14" },
                { "field": "f7_assists", "ftype": "textfield", "title": "Assists", "value": "12" },
                { "field": "f8", "ftype": "textfield", "title": "Accuracy", "value": "34%" }
            ]
        };
    </script>
</body>
</html>
