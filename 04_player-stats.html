<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Player Stats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3d",
                        "surface-container": "#171f33",
                        "outline": "#8c909f",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#001a42",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#adc6ff",
                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#272a2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },

    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; }
        .player-card {
            position: absolute;
            left: 200px; top: 150px;
            width: 1500px;
            height: 780px;
            display: flex;
            align-items: flex-end;
        }
        .portrait-container {
            width: 600px;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        .portrait-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }
        .stats-content {
            flex-grow: 1;
            background: rgba(11, 19, 38, 0.85);
            backdrop-blur: 24px;
            height: 600px;
            margin-left: -100px;
            padding: 60px 80px 60px 140px;
            border-left: 8px solid #ffb690;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 5% 100%);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 40px;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUpIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-in { animation: slideUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div id="card" class="player-card">
            <div class="portrait-container">
                <img id="f2" src="images/characters/1.png" alt="Player Portrait">
            </div>
            <div class="stats-content">
                <div class="flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <img id="team-logo" src="team_logos/titan.png" class="w-12 h-12 object-contain" alt="">
                        <span id="f1" class="text-secondary font-black tracking-[0.4em] uppercase text-xl">TEAM TITANS</span>
                    </div>
                    <h1 id="f0" class="font-black text-8xl uppercase italic tracking-tighter leading-none mb-4">TITAN_REX</h1>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">KILLS</span>
                        <span id="f3" class="text-primary font-black text-5xl">45</span>
                    </div>
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">DAMAGE</span>
                        <span id="f4" class="text-on-surface font-black text-5xl">12,480</span>
                    </div>
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">HEADSHOTS</span>
                        <span id="f5" class="text-on-surface font-black text-5xl">14</span>
                    </div>
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">SURVIVAL TIME</span>
                        <span id="f6" class="text-on-surface font-black text-5xl">22:14</span>
                    </div>
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">ASSISTS</span>
                        <span id="f7" class="text-on-surface font-black text-5xl">12</span>
                    </div>
                    <div class="stat-item">
                        <span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">ACCURACY</span>
                        <span id="f8" class="text-on-surface font-black text-5xl">34%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sheetInterval = null;

        async function fetchSheet(url, targetSlot, targetPlayerIndex) {
            try {
                let cleanUrl = url.trim();
                let docIdMatch = cleanUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                let csvText = null;

                if (docIdMatch) {
                    let docId = docIdMatch[1];
                    let teamsUrl = `https://docs.google.com/spreadsheets/d/${docId}/gviz/tq?tqx=out:csv&sheet=Teams`;
                    try {
                        const res = await fetch(teamsUrl);
                        const txt = await res.text();
                        if (!txt.includes('<!DOCTYPE html>') && txt.includes(',')) {
                            csvText = txt;
                        }
                    } catch (e) {}
                }

                if (!csvText) {
                    if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                    if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');
                    const response = await fetch(cleanUrl);
                    csvText = await response.text();
                }

                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const lines = results.data;
                        if (lines.length < 2) return;

                        // Find the row for targetSlot
                        const teamRow = lines.find(cols => cols[0] == targetSlot);
                        if (!teamRow) return;

                        const teamName = teamRow[1]?.trim() || '';
                        const teamTag = teamRow[2]?.trim() || '';
                        
                        // Player Index is 1-4. Member names are at 4, 5, 6, 7. Kills at 8, 9, 10, 11
                        const pIdx = parseInt(targetPlayerIndex) - 1;
                        if (pIdx < 0 || pIdx > 3) return;

                        const playerName = teamRow[4 + pIdx]?.trim() || 'UNKNOWN';
                        const playerKills = teamRow[8 + pIdx]?.trim() || '0';
                        
                        // Update UI manually for the automated parts
                        document.getElementById('f0').innerText = playerName.toUpperCase();
                        document.getElementById('f1').innerText = teamName.toUpperCase();
                        document.getElementById('f3').innerText = playerKills;
                        
                        let logo = teamTag.toLowerCase() || teamName.split(' ')[0].toLowerCase();
                        document.getElementById('team-logo').src = `team_logos/${logo}.png`;
                    }
                });
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;

                if (data.f7 && data.f7.startsWith('http')) {
                    const slot = data.f9 || "1";
                    const pIdx = data.f10 || "1";
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7, slot, pIdx);
                    sheetInterval = setInterval(() => fetchSheet(data.f7, slot, pIdx), 5000);
                }

                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                if (data.f1) {
                    document.getElementById('f1').innerText = data.f1.toUpperCase();
                    // Auto-load logo if icon asset specified
                    let logo = data.f1.split(' ')[0].toLowerCase();
                    document.getElementById('team-logo').src = `team_logos/${logo}.png`;
                }
                if (data.f2) {
                    let path = data.f2;
                    if (!path.includes('/')) path = 'images/characters/' + path;
                    if (!path.includes('.')) path += '.png';
                    document.getElementById('f2').src = path;
                }
                
                ['f3', 'f4', 'f5', 'f6', 'f7_assists', 'f8'].forEach(field => {
                    if (data[field]) document.getElementById(field.replace('_assists', '')).innerText = data[field];
                });
                
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
            const card = document.getElementById('card');
            card.classList.remove('animate-in');
            void card.offsetWidth;
            card.classList.add('animate-in');
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Player Highlight Stats",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "13",
            "webplayout": "13",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "6",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f9", "ftype": "textfield", "title": "Team Slot Number", "value": "1" },
                { "field": "f10", "ftype": "textfield", "title": "Player Index (1-4)", "value": "1" },
                { "field": "f0", "ftype": "textfield", "title": "Player Name (Manual)", "value": "TITAN_REX" },
                { "field": "f1", "ftype": "textfield", "title": "Team Name (Manual)", "value": "TEAM TITANS" },
                { "field": "f2", "ftype": "textfield", "title": "Portrait ID", "value": "1" },
                { "field": "f3", "ftype": "textfield", "title": "Kills", "value": "45" },
                { "field": "f4", "ftype": "textfield", "title": "Damage", "value": "12,480" },
                { "field": "f5", "ftype": "textfield", "title": "Headshots", "value": "14" },
                { "field": "f6", "ftype": "textfield", "title": "Survival Time", "value": "22:14" },
                { "field": "f7_assists", "ftype": "textfield", "title": "Assists", "value": "12" },
                { "field": "f8", "ftype": "textfield", "title": "Accuracy", "value": "34%" }
            ]
        };
    </script>
</body>
</html>
