<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SPX – PUBG Mobile Map Widget v4</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --orange: #ffb690;
            --blue: #adc6ff;
            --bg-panel: rgba(5, 8, 20, 0.96);
            --border: rgba(255, 255, 255, 0.06);
            --text-dim: rgba(218, 226, 253, 0.36);
            --text-full: #dae2fd;
        }

        body {
            background: transparent;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Barlow', sans-serif;
        }

        #wrapper {
            opacity: 0;
            transition: opacity 0.6s ease;
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        /* ══════════════════════════════════════
           PHASE 0 — INTRO CARDS
        ══════════════════════════════════════ */
        #intro-sequence {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 20;
            background: radial-gradient(circle at center, rgba(11, 19, 38, 0.95) 0%, #050814 100%);
        }

        .intro-card {
            width: 200px;
            background: rgba(6, 10, 22, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.07);
            overflow: hidden;
            opacity: 0;
            transform: translateY(50px);
            transition: border-color 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease, opacity 0.35s ease;
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.93);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .intro-card .ci-img {
            width: 100%;
            height: 120px;
            overflow: hidden;
            position: relative;
        }

        .intro-card .ci-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: brightness(0.6);
            transition: filter 0.5s ease;
        }

        .intro-card .ci-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(218, 226, 253, 0.55);
            background: rgba(0, 0, 0, 0.6);
            padding: 3px 7px;
        }

        .intro-card .ci-body {
            padding: 10px 12px 14px;
        }

        .intro-card .ci-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--text-full);
            line-height: 1;
            margin-bottom: 5px;
        }

        .intro-card .ci-status {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .intro-card .ci-time {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--orange);
            font-variant-numeric: tabular-nums;
        }

        .intro-card.dimmed {
            filter: brightness(0.28);
            transform: scale(0.95);
        }

        .intro-card.selected {
            border-color: var(--orange);
        }

        .intro-card.selected .ci-img img {
            filter: brightness(0.9);
        }

        .intro-card.selected .ci-name {
            color: var(--orange);
        }

        .intro-card.selected .ci-badge {
            background: var(--orange);
            color: #3d1a00;
        }

        .intro-card.zoom-out {
            transform: scale(10) !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        /* ══════════════════════════════════════
           PHASE 1 — CINEMATIC REVEAL
        ══════════════════════════════════════ */
        #map-reveal {
            position: absolute;
            inset: 0;
            display: none;
            overflow: hidden;
            z-index: 15;
        }

        #map-reveal-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        #map-reveal::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 50%, transparent 20%, rgba(4, 7, 16, 0.78) 100%),
                linear-gradient(to bottom, rgba(4, 7, 16, 0.4) 0%, transparent 25%, transparent 70%, rgba(4, 7, 16, 0.75) 100%);
            pointer-events: none;
            z-index: 1;
        }

        #map-reveal::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 4px);
            pointer-events: none;
            z-index: 2;
        }

        #reveal-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
        }

        #reveal-lines::before,
        #reveal-lines::after {
            content: '';
            position: absolute;
            top: 0;
            height: 1px;
            background: rgba(255, 182, 144, 0.35);
            width: 0;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #reveal-lines::before {
            right: 0;
        }

        #reveal-lines::after {
            left: 0;
        }

        #reveal-lines.expand::before,
        #reveal-lines.expand::after {
            width: 800px;
        }

        #reveal-map-name {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 5;
            text-align: center;
            opacity: 0;
            pointer-events: none;
        }

        .rmn-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: rgba(255, 182, 144, 0.55);
            margin-bottom: 4px;
            display: block;
        }

        #reveal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 160px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: #fff;
            line-height: 0.88;
            display: block;
        }

        .rmn-match {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 9px;
            text-transform: uppercase;
            color: var(--orange);
            margin-top: 10px;
            display: block;
        }

        /* ══════════════════════════════════════
           PHASE 2 — MAIN WIDGET
        ══════════════════════════════════════ */
        #widget-main {
            position: absolute;
            inset: 0;
            display: none;
            opacity: 0;
        }

        #left-sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 420px;
            height: 1080px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            z-index: 10;
            opacity: 0;
            transform: translateX(-50px);
        }

        @keyframes leftbarIn {
            0% { opacity: 0; transform: translateX(-60px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .logo-row-1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .uni-logo {
            height: 100px;
            width: auto;
            max-width: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .log-cross {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 34px;
            color: var(--orange);
            font-weight: 700;
        }

        .logo-row-2 {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .tourney-logo {
            width: 260px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        /* ── 1080×1080 TACTICAL CANVAS (left area) ── */
        /* Sits in the middle: width = 1080px to match 1:1 map */
        #tactical-canvas {
            position: absolute;
            top: 0;
            left: 420px;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            opacity: 0;
        }

        @keyframes canvasIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        /* The SVG fills the entire 1080×1080 space */
        #tactical-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Animated elements within SVG */
        .grid-line {
            animation: gridFade 3s ease-in-out infinite alternate;
        }

        @keyframes gridFade {
            0% {
                opacity: 0.6
            }

            100% {
                opacity: 1
            }
        }

        .ring-pulse {
            animation: ringPulse 4s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes ringPulse {

            0%,
            100% {
                opacity: 0.25;
                transform: scale(1);
            }

            50% {
                opacity: 0.55;
                transform: scale(1.015);
            }
        }

        .scan-line {
            animation: scanMove 6s linear infinite;
        }

        @keyframes scanMove {
            0% {
                transform: translateY(-1080px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(1080px);
                opacity: 0;
            }
        }

        .dot-blink {
            animation: dotBlink 2s ease-in-out infinite;
        }

        @keyframes dotBlink {

            0%,
            100% {
                opacity: 1;
                r: 3;
            }

            50% {
                opacity: 0.3;
                r: 5;
            }
        }

        /* Corner bracket elements */
        .corner-bracket {
            opacity: 0.5;
        }

        /* Map name watermark on tactical canvas */
        #canvas-map-name {
            position: absolute;
            bottom: 52px;
            left: 60px;
            z-index: 3;
            opacity: 0;
            transform: translateX(-20px);
        }

        #canvas-map-name .cmn-small {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 182, 144, 0.35);
            margin-bottom: 2px;
        }

        #canvas-map-name .cmn-big {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 110px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -4px;
            color: rgba(255, 255, 255, 0.04);
            line-height: 0.85;
            /* Visible ghost text */
        }

        @keyframes canvasNameIn {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Match indicator top-left of canvas */
        #canvas-match-badge {
            position: absolute;
            top: 36px;
            left: 40px;
            z-index: 4;
            opacity: 0;
        }

        @keyframes badgeIn {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #canvas-match-badge .cmb-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 182, 144, 0.4);
        }

        #canvas-match-badge .cmb-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 48px;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 182, 144, 0.15);
            line-height: 1;
            letter-spacing: -1px;
        }

        /* Zone phase indicator — centre-right of canvas */
        #canvas-zone-block {
            position: absolute;
            top: 50%;
            right: 60px;
            transform: translateY(-50%);
            z-index: 4;
            text-align: right;
            opacity: 0;
        }

        @keyframes zoneIn {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        #canvas-zone-block .czb-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(173, 198, 255, 0.3);
            display: block;
        }

        #canvas-zone-block .czb-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 72px;
            font-weight: 900;
            font-style: italic;
            color: rgba(173, 198, 255, 0.08);
            line-height: 1;
            letter-spacing: -2px;
            display: block;
        }

        /* Coordinate labels along edges — purely decorative */
        .coord-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            fill: rgba(173, 198, 255, 0.18);
        }

        /* ── RIGHT SIDEBAR ── */
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 420px;
            height: 1080px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateX(50px);
        }

        @keyframes sidebarIn {
            0% {
                opacity: 0;
                transform: translateX(60px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Sidebar hero — portrait crop from TOP */
        #sidebar-hero {
            width: 100%;
            height: 220px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        #sidebar-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        #sidebar-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--bg-panel));
            pointer-events: none;
        }

        #sh-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 2;
        }

        .shb-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(218, 226, 253, 0.38);
        }

        #badge-match-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            color: var(--orange);
            line-height: 1;
        }

        #sh-map-name {
            position: absolute;
            bottom: 12px;
            left: 14px;
            right: 14px;
            z-index: 2;
        }

        .shmn-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(218, 226, 253, 0.3);
            margin-bottom: 1px;
        }

        #sh-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 34px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #fff;
            line-height: 1;
        }

        /* Live row */
        #live-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #f87171;
            animation: pulseDot 1.5s ease-in-out infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }

        #live-row span {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Info tiles */
        #info-tiles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .info-tile {
            background: var(--bg-panel);
            padding: 10px 14px;
        }

        .t-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .t-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-full);
        }

        /* Stats */
        #stats-block {
            flex-shrink: 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.035);
            opacity: 0;
            transform: translateX(18px);
        }

        @keyframes statIn {
            0% {
                opacity: 0;
                transform: translateX(24px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stat-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .stat-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            font-variant-numeric: tabular-nums;
            color: var(--text-full);
        }

        .col-orange {
            color: var(--orange);
        }

        .col-blue {
            color: var(--blue);
        }

        /* Progress */
        #progress-block {
            padding: 10px 16px 12px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            opacity: 0;
        }

        @keyframes progIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .prog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .prog-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #progress-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--orange);
        }

        .prog-track {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
        }

        .prog-fill {
            height: 100%;
            background: var(--orange);
            transition: width 1s linear;
        }

        /* Map list */
        #map-list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #map-list-hdr {
            display: flex;
            align-items: center;
            padding: 9px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.035);
            flex-shrink: 0;
        }

        #map-list-hdr span {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #map-list-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ml-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.025);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            opacity: 0;
            transform: translateX(30px);
        }

        @keyframes mlIn {
            0% {
                opacity: 0;
                transform: translateX(40px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .ml-item.active {
            background: rgba(255, 182, 144, 0.06);
        }

        .ml-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--orange);
        }

        .ml-thumb {
            width: 44px;
            height: 30px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ml-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: brightness(0.5) saturate(0.6);
            transition: filter 0.3s ease;
        }

        .ml-item.active .ml-thumb img {
            filter: brightness(0.85) saturate(1);
        }

        .ml-info {
            flex: 1;
            min-width: 0;
        }

        .ml-match {
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            line-height: 1;
        }

        .ml-item.active .ml-match {
            color: rgba(255, 182, 144, 0.5);
        }

        .ml-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            font-weight: 700;
            font-style: italic;
            text-transform: uppercase;
            color: rgba(218, 226, 253, 0.38);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
            margin-top: 1px;
        }

        .ml-item.active .ml-name {
            color: var(--orange);
        }

        .ml-right {
            text-align: right;
            flex-shrink: 0;
        }

        .ml-done-tag {
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;

                const isActive = m.id === currentIndex;
                const div = document.createElement('div');
                div.className = 'ml-item' + (isActive ? ' active' : '');
                
                // If the main intro animation has finished, make items visible immediately
                if (!animationPlaying) {
                    div.style.opacity = '1';
                    div.style.transform = 'translateX(0)';
                }

                const rightHTML = isActive
                    ? `<div class="ml-live-dot"></div>`
                    : m.time
                        ? `<div class="ml-right"><div class="ml-done-tag">Done</div><div class="ml-time">${m.time}</div></div>`
                        : '';
                div.innerHTML = `
                <div class="ml-thumb"><img src="images/maps/${m.name.toLowerCase()}.jpeg" alt="${dn(m.name)}"></div>
                <div class="ml-info">
                    <div class="ml-match">Match 0${m.id}</div>
                    <div class="ml-name">${dn(m.name)}</div>
                </div>${rightHTML}`;
                inner.appendChild(div);
            });
        }

        function animateMapListIn() {
            document.querySelectorAll('.ml-item').forEach((e, i) => {
                e.style.animation = `mlIn 0.55s cubic-bezier(0.16,1,0.3,1) ${0.55 + i * 0.08}s forwards`;
            });
        }

        /* ── Set all map assets ── */
        function setMapAssets(m) {
            const src = `images/maps/${m.name.toLowerCase()}.jpeg`;
            const name = dn(m.name);
            el('portrait-map-asset').src = src;
            el('map-reveal-img').src = src;
            el('sh-title').innerText = name;
            el('badge-match-num').innerText = `M0${m.id}`;
            el('canvas-map-title').innerText = name;
            el('canvas-match-num').innerText = pad(m.id);
            el('reveal-title').innerText = name;
            el('reveal-match').innerText = `Match 0${m.id}`;
        }

        /* ── Sheet sync ── */
        async function fetchSheet(url) {
            try {
                let u = url.trim();
                if (u.includes('/edit')) u = u.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (u.includes('pub?')) u = u.replace('output=html', 'output=csv');
                const res = await fetch(u);
                const csv = await res.text();
                if (csv.includes('<!DOCTYPE html>')) return;
                Papa.parse(csv, {
                    skipEmptyLines: true, complete({ data }) {
                        if (data.length < 2) return;
                        const h = data[0];
                        if (h.length > 9) setStartTime(h[9]);
                        let pa = 0, ta = 0;
                        data.slice(2, 27).forEach(cols => {
                            const name = cols[1]?.trim() || '';
                            if (!name || name === 'TeamName') return;
                            const a = [4, 5, 6, 7].filter(i => cols[i]?.trim().toUpperCase() === 'TRUE').length;
                            if (a > 0) { ta++; pa += a; }
                        });
                        if (pa > 0) el('hud-f1').innerText = pad(pa);
                        if (ta > 0) el('hud-f2').innerText = pad(ta);
                        const zone = h[8]?.trim();
                        if (zone) { el('hud-f3').innerText = zone; el('canvas-zone-num').innerText = zone; }
                        if (h[10]?.trim()) el('hud-f4').innerText = h[10].trim();
                        el('hud-f5').innerText = h[11]?.trim() || '—';

                        if (data.length > 32) {
                            const mapsRow = data[31], selRow = data[32], timesRow = data[33] || [];
                            globalCurrentMatchIndex = parseInt(selRow[1]?.trim()) || 1;
                            let mapConfig = [];
                            for (let i = 1; i <= 6; i++) {
                                if (mapsRow[i]?.trim()) mapConfig.push({ id: i, name: mapsRow[i].trim().toUpperCase(), time: timesRow[i]?.trim() || '' });
                            }
                            if (!animationPlaying) buildIntroSequenceDOM(mapConfig, globalCurrentMatchIndex);
                            buildMapList(mapConfig, globalCurrentMatchIndex);
                            const sel = mapConfig.find(m => m.id === globalCurrentMatchIndex);
                            if (sel) setMapAssets(sel);
                        }
                    }
                });
            } catch (e) { console.error('Sheet error:', e); }
        }

        function buildIntroSequenceDOM(mapConfig, currentIndex) {
            const fresh = JSON.stringify({ mapConfig });
            if (fresh === currentMapConfigJSON) return;
            currentMapConfigJSON = fresh;
            const intro = el('intro-sequence');
            intro.innerHTML = '';
            mapConfig.forEach(m => {
                const card = document.createElement('div');
                card.className = 'intro-card'; card.dataset.id = m.id;
                card.innerHTML = `
                <div class="ci-img">
                    <img src="images/maps/${m.name.toLowerCase()}.jpeg" alt="${dn(m.name)}">
                    <div class="ci-badge">Match 0${m.id}</div>
                </div>
                <div class="ci-body">
                    <div class="ci-name">${dn(m.name)}</div>
                    ${m.time
                        ? `<div class="ci-status">Completed</div><div class="ci-time">${m.time}</div>`
                        : `<div class="ci-status">Upcoming</div>`}
                </div>`;
                intro.appendChild(card);
            });
            isDataLoaded = true;
            if (queuedPlayCommand && !animationPlaying) executeAnimationFlow();
        }

        function setStartTime(v) {
            if (!v?.trim()) return;
            let s = v.trim();
            const isPM = s.toUpperCase().includes('PM');
            const isAM = s.toUpperCase().includes('AM');
            s = s.replace(/[A-Za-z]/g, '').trim();
            const parts = s.split(':');
            let hours = parseInt(parts[0]) || 0, m = parseInt(parts[1]) || 0, sec = parseInt(parts[2]) || 0;
            if (isPM && hours < 12) hours += 12;
            if (isAM && hours === 12) hours = 0;
            const now = new Date();
            const st = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, m, sec);
            if (st > now.getTime() + 60000) st.setDate(st.getDate() - 1);
            matchStartTimeObj = st;
        }

        function updateProgress() {
            if (!matchStartTimeObj) return;
            const elapsed = Math.max(0, Math.floor((Date.now() - matchStartTimeObj) / 1000));
            const pct = Math.min((elapsed / FULL_MATCH_SECONDS) * 100, 100);
            const s = Math.floor(pct) + '%';
            el('progress-text').innerText = s;
            el('progress-bar').style.width = s;
        }

        /* ── SPX API ── */
        function update(rawData) {
            try {
                const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f1) el('full-f1').innerText = data.f1;
                if (data.f2) el('full-f2').innerText = data.f2;
                if (data.f7?.startsWith('http')) {
                    clearInterval(sheetInterval); clearInterval(progressInterval);
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 3500);
                    progressInterval = setInterval(updateProgress, 1000);
                }
            } catch (e) { console.error('Update:', e); }
        }

        function play() {
            el('wrapper').style.opacity = '1';
            queuedPlayCommand = true;
            if (isDataLoaded && !animationPlaying) executeAnimationFlow();
        }

        function stop() {
            el('wrapper').style.opacity = '0';
            animationPlaying = false;
            animTimeouts.forEach(clearTimeout);
            animTimeouts = [];
        }

        /* ── Main animation flow ── */
        function executeAnimationFlow() {
            animationPlaying = true; queuedPlayCommand = false;

            const intro = el('intro-sequence');
            const reveal = el('map-reveal');
            const widget = el('widget-main');
            const sidebar = el('sidebar');
            const canvas = el('tactical-canvas');
            const cBadge = el('canvas-match-badge');
            const cName = el('canvas-map-name');
            const cZone = el('canvas-zone-block');

            [intro, reveal, widget].forEach(e => { e.style.display = 'none'; e.style.opacity = '0'; });

            /* Phase 0: Intro cards */
            intro.style.display = 'flex'; intro.style.opacity = '1';
            const cards = intro.querySelectorAll('.intro-card');
            cards.forEach((c, i) => {
                c.classList.remove('dimmed', 'selected', 'zoom-out');
                c.style.animation = `cardIn 0.6s cubic-bezier(0.16,1,0.3,1) ${i * 0.11}s forwards`;
            });

            animTimeouts.push(setTimeout(() => {
                cards.forEach(c => c.classList.add(parseInt(c.dataset.id) === globalCurrentMatchIndex ? 'selected' : 'dimmed'));
            }, 1700));

            animTimeouts.push(setTimeout(() => {
                const sel = intro.querySelector('.selected');
                if (sel) sel.classList.add('zoom-out');
                cards.forEach(c => {
                    if (parseInt(c.dataset.id) !== globalCurrentMatchIndex) {
                        c.style.transition = 'opacity 0.25s ease'; c.style.opacity = '0';
                    }
                });
            }, 3100));

            /* Phase 1: Cinematic reveal */
            animTimeouts.push(setTimeout(() => {
                intro.style.opacity = '0';
                animTimeouts.push(setTimeout(() => { intro.style.display = 'none'; }, 400));

                reveal.style.display = 'block'; reveal.style.opacity = '0';
                const revImg = el('map-reveal-img');
                const revName = el('reveal-map-name');
                const revLines = el('reveal-lines');

                revImg.style.cssText += ';transition:none;transform:scale(2.2);filter:brightness(0.08) saturate(0.3);';
                revName.style.cssText += ';transition:none;transform:translate(-50%,-60%) scale(5);opacity:0;';
                revLines.classList.remove('expand');
                void revImg.offsetWidth;

                reveal.style.transition = 'opacity 0.3s ease';
                reveal.style.opacity = '1';

                animTimeouts.push(setTimeout(() => {
                    revImg.style.transition = 'transform 3s cubic-bezier(0.16,1,0.3,1), filter 3s ease';
                    revImg.style.transform = 'scale(1)';
                    revImg.style.filter = 'brightness(0.28) saturate(0.5)';
                    revName.style.transition = 'transform 2.8s cubic-bezier(0.16,1,0.3,1), opacity 0.6s ease';
                    revName.style.transform = 'translate(-50%,-50%) scale(1)';
                    revName.style.opacity = '1';
                    animTimeouts.push(setTimeout(() => revLines.classList.add('expand'), 500));
                }, 180));
            }, 3500));

            /* Phase 2: Main widget */
            animTimeouts.push(setTimeout(() => {
                reveal.style.transition = 'opacity 0.75s ease';
                reveal.style.opacity = '0';
                animTimeouts.push(setTimeout(() => { reveal.style.display = 'none'; }, 750));

                widget.style.display = 'block'; widget.style.opacity = '1';

                /* Fade out solid background */
                const solidBg = el('solid-bg');
                if (solidBg) {
                    solidBg.style.transition = 'opacity 0.75s ease';
                    solidBg.style.opacity = '0';
                    animTimeouts.push(setTimeout(() => { solidBg.style.display = 'none'; }, 750));
                }

                /* Left sidebar fades/slides in */
                el('left-sidebar').style.animation = 'leftbarIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s forwards';

                /* Tactical canvas fades in */
                canvas.style.animation = 'canvasIn 1.2s ease 0.1s forwards';

                /* Canvas overlays stagger in */
                cBadge.style.animation = 'badgeIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards';
                cName.style.animation = 'canvasNameIn 1s cubic-bezier(0.16,1,0.3,1) 0.6s forwards';
                cZone.style.animation = 'zoneIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.7s forwards';

                /* Sidebar slides in */
                sidebar.style.animation = 'sidebarIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s forwards';

                /* Stat rows */
                const statRows = sidebar.querySelectorAll('.stat-row');
                statRows.forEach((row, i) => {
                    row.style.animation = `statIn 0.55s cubic-bezier(0.16,1,0.3,1) ${0.3 + i * 0.07}s forwards`;
                });
                el('progress-block').style.animation =
                    `progIn 0.55s cubic-bezier(0.16,1,0.3,1) ${0.3 + statRows.length * 0.07}s forwards`;

                animateMapListIn();
                animationPlaying = false;
            }, 7300));
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Map Widget v4 — Tactical Canvas",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "5", "webplayout": "5",
            "out": "manual", "dataformat": "json", "uicolor": "7",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL", "value": "" },
                { "field": "f1", "ftype": "textfield", "title": "Weather", "value": "Clear Sky" },
                { "field": "f2", "ftype": "textfield", "title": "E-Portal Status", "value": "Active" }
            ]
        };
    </script>
</body>

</html>
