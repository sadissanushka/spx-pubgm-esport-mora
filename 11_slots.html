<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Team Slots</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#adc6ff",
                        "secondary": "#ffb690",
                        "surface-dim": "#0b1326",
                        "surface-container": "#171f33",
                        "on-surface": "#dae2fd",
                    }
                }
            }
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 1600px;
        }
        .slot-card {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-left: 4px solid rgba(255, 255, 255, 0.1);
        }
        .slot-id {
            background: #ffb690;
            color: #552100;
            font-weight: 900;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            font-style: italic;
        }
        .slot-logo { height: 60px; width: 60px; object-fit: contain; }
        .slot-name { font-weight: 800; font-size: 20px; color: #dae2fd; text-transform: uppercase; }
        @keyframes slideInDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slot { animation: slideInDown 0.5s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div class="mb-10 w-[1600px] border-b-2 border-secondary pb-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-secondary text-5xl">groups</span>
                <h1 id="f0" class="text-on-surface font-black text-5xl uppercase italic tracking-tighter">SQUAD LINEUP</h1>
            </div>
            <div class="text-secondary font-bold tracking-widest uppercase opacity-60">DAY 02 / MATCH 08</div>
        </div>

        <div id="slots-list" class="slots-grid">
            <!-- 16 slots will be here -->
        </div>
    </div>

    <script>
        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                
                let slots = [];
                if (data.f1) {
                    slots = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                } else {
                    // Static demo slots
                    const logos = ['titan', 'epic', 'aut', 'gs', 'abn', 'b4', 'epic', 'gs', 'titan', 'aut', 'abn', 'b4', 'titan', 'epic', 'aut', 'gs'];
                    for(let i=1; i<=16; i++) {
                        slots.push({ id: i, name: `TEAM ${logos[i-1].toUpperCase()}`, logo: logos[i-1] });
                    }
                }

                const list = document.getElementById('slots-list');
                list.innerHTML = '';
                
                slots.forEach((slot, index) => {
                    const card = document.createElement('div');
                    card.className = `slot-card animate-slot`;
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    let logoPath = slot.logo;
                    if (!logoPath.includes('/')) logoPath = 'team_logos/' + logoPath;
                    if (!logoPath.includes('.')) logoPath += '.png';

                    card.innerHTML = `
                        <div class="slot-id">${slot.id}</div>
                        <img src="${logoPath}" class="slot-logo" onerror="this.style.opacity=0">
                        <span class="slot-name">${slot.name}</span>
                    `;
                    list.appendChild(card);
                });
                
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() { document.getElementById('wrapper').style.opacity = '1'; }
        function stop() { document.getElementById('wrapper').style.opacity = '0'; }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Squad Lineup Slots",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "8", "webplayout": "8",
            "out": "manual", "dataformat": "json", "uicolor": "11",
            "DataFields": [
                { "field": "f0", "ftype": "textfield", "title": "Heading", "value": "SQUAD LINEUP" },
                { "field": "f1", "ftype": "textfield", "title": "JSON Data", "value": "[]" }
            ]
        };
    </script>
</body>
</html>
