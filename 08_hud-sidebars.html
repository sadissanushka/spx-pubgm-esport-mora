<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SPX - Dual Sidebar HUD (Alive vs Dead)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="uni_mapper.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error": "#ffb4ab",
            "surface-container-high": "#222a3d",
            "surface-container": "#171f33",
            "outline": "#8c909f",
            "secondary": "#ffb690",
            "on-tertiary-fixed": "#191c1e",
            "on-secondary-container": "#4a1c00",
            "tertiary-fixed": "#e0e3e5",
            "surface-dim": "#0b1326",
            "on-error": "#690005",
            "on-background": "#dae2fd",
            "secondary-fixed-dim": "#ffb690",
            "on-secondary": "#552100",
            "tertiary": "#c4c7c9",
            "on-error-container": "#ffdad6",
            "secondary-container": "#ec6a06",
            "on-tertiary-fixed-variant": "#444749",
            "surface-container-highest": "#2d3449",
            "on-tertiary": "#2d3133",
            "on-primary-container": "#00285d",
            "inverse-surface": "#dae2fd",
            "error-container": "#93000a",
            "surface-container-lowest": "#060e20",
            "on-secondary-fixed-variant": "#783200",
            "surface-tint": "#adc6ff",
            "on-primary-fixed-variant": "#004395",
            "inverse-on-surface": "#283044",
            "on-primary": "#002e6a",
            "surface": "#0b1326",
            "outline-variant": "#424754",
            "surface-variant": "#2d3449",
            "tertiary-container": "#8e9193",
            "surface-container-low": "#131b2e",
            "primary-container": "#4d8eff",
            "inverse-primary": "#005ac2",
            "surface-bright": "#31394d",
            "on-primary-fixed": "#001a42",
            "primary-fixed": "#d8e2ff",
            "tertiary-fixed-dim": "#c4c7c9",
            "secondary-fixed": "#ffdbca",
            "primary": "#adc6ff",
            "on-secondary-fixed": "#341100",
            "background": "#0b1326",
            "on-surface": "#dae2fd",
            "on-surface-variant": "#c2c6d6",
            "primary-fixed-dim": "#adc6ff",
            "on-tertiary-container": "#272a2c"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: transparent;
      margin: 0;
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
    }

    #wrapper {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .asymmetric-header {
      clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
    }

    .asymmetric-header-right {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 5% 100%);
    }

    @keyframes slideLeft {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(0);
      }
    }

    @keyframes slideRight {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    .animate-left {
      animation: slideLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-right {
      animation: slideRight 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    ::view-transition-group(*) {
      animation-duration: 0.6s;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }
  </style>
</head>

<body class="text-on-surface">
  <div id="wrapper">
    <!-- HUD TOP BAR -->
    <header
      class="fixed top-0 left-0 w-full z-[60] flex justify-between items-center px-6 h-12 bg-slate-950/90 backdrop-blur-lg border-b border-white/5">
      <div class="flex items-center gap-4">
        <span id="f1"
          class="text-blue-400 font-bold text-xs uppercase tracking-widest border-l border-white/10 pl-4 leading-none">PHASE
          04</span>
      </div>
      <div class="flex gap-4">
        <div class="px-3 py-1 bg-surface-container-highest flex items-center gap-2">
          <span class="w-2 h-2 bg-secondary animate-pulse rounded-full"></span>
          <span id="alive-counter" class="text-xs font-bold uppercase tracking-widest text-on-surface">ALIVE: 0 /
            0</span>
        </div>
        <div id="match-info"
          class="px-3 py-1 bg-primary text-black font-black text-xs uppercase tracking-widest leading-none">ZONE FEED
        </div>
      </div>
    </header>

    <!-- LEFT SIDEBAR (Surviving Teams) -->
    <aside id="sidebar-left"
      class="fixed left-0 top-0 h-screen z-50 flex flex-col w-64 bg-slate-950/85 backdrop-blur-md pt-12 border-r border-white/5">
      <div class="p-6">
        <h1 id="f0" class="text-xl font-black italic tracking-tighter text-blue-100">BATTLEGROUNDS</h1>
        <p class="text-[10px] text-blue-300 font-bold tracking-[0.2em] mt-1">SURVIVING TEAMS</p>
      </div>
      <div class="asymmetric-header bg-primary px-4 py-2 mb-2">
        <span class="text-black font-black text-xs">STATUS: STANDING</span>
      </div>
      <div id="list-left" class="flex-1 overflow-y-auto space-y-[2px] custom-scrollbar"></div>
    </aside>

    <!-- RIGHT SIDEBAR (Eliminated Teams) -->
    <aside id="sidebar-right"
      class="fixed right-0 top-0 h-screen z-50 flex flex-col w-64 bg-slate-950/85 backdrop-blur-md pt-12 border-l border-white/5">
      <div class="p-6 text-right">
        <h2 class="text-xl font-black italic tracking-tighter text-blue-100 uppercase">MATCH INTEL</h2>
        <p class="text-[10px] text-secondary font-bold tracking-[0.2em] mt-1 uppercase">ELIMINATED TEAMS</p>
      </div>
      <div class="asymmetric-header-right bg-red-600 px-4 py-2 mb-2 text-right">
        <span class="text-white font-black text-xs">STATUS: DEAD</span>
      </div>
      <div id="list-right" class="flex-1 overflow-y-auto space-y-[2px] custom-scrollbar"></div>
      <div class="p-6 bg-surface-container-highest/20 mt-auto flex justify-between items-center">
        <span class="text-[10px] font-black uppercase text-gray-500 tracking-widest leading-none">TIMER:</span>
        <span id="f3" class="text-secondary text-base font-black leading-none">00:00</span>
      </div>
    </aside>
  </div>

  <script>
    let sheetInterval = null;
    let timerInterval = null;
    let currentSeconds = 0;
    let timerRunning = false;
    let lastTimeStr = "";

    function updateTimerDisplay() {
      if (currentSeconds <= 0) {
        document.getElementById('f3').innerText = "00:00";
        return;
      }
      const m = Math.floor(currentSeconds / 60).toString().padStart(2, '0');
      const s = (currentSeconds % 60).toString().padStart(2, '0');
      document.getElementById('f3').innerText = `${m}:${s}`;
    }

    function setTimer(timeStr) {
      if (!timeStr) return;
      if (timeStr === lastTimeStr) return;

      const match = timeStr.match(/(\d{1,2}):(\d{2})/);
      if (match) {
        lastTimeStr = timeStr;
        const newSecs = parseInt(match[1]) * 60 + parseInt(match[2]);

        if (Math.abs(newSecs - currentSeconds) > 3) {
          currentSeconds = newSecs;
          timerRunning = true;
          updateTimerDisplay();

          if (!timerInterval) {
            timerInterval = setInterval(() => {
              if (timerRunning && currentSeconds > 0) {
                currentSeconds--;
                updateTimerDisplay();
              }
            }, 1000);
          }
        }
      }
    }

    async function fetchSheet(url) {
      try {
        let cleanUrl = url.trim();
        if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
        if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

        const response = await fetch(cleanUrl);
        const csvText = await response.text();
        if (csvText.includes('<!DOCTYPE html>')) return;

        Papa.parse(csvText, {
          skipEmptyLines: true,
          complete: function (results) {
            const lines = results.data;
            if (lines.length < 2) return;

            let totalAlive = 0;
            let totalParticipating = 0;
            let rawTime = "";

            lines.forEach(cols => {
              cols.forEach(col => { if (col && col.includes(':') && !rawTime) rawTime = col.trim(); });
            });

            const allRows = lines.slice(2, 27).map(cols => {
              if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;

              const pips = [cols[4], cols[5], cols[6], cols[7]].filter(c => c?.trim().toUpperCase() === 'TRUE').length;
              totalAlive += pips;
              totalParticipating += 4;

              return {
                slot: cols[0]?.trim() || '0', name: cols[1].trim(), logo: cols[2]?.trim() || '',
                pts: cols[10]?.trim() || '0', rank: cols[9]?.trim() || '', alive: pips
              };
            }).filter(r => r !== null);

            document.getElementById('alive-counter').innerText = `ALIVE: ${totalAlive} / ${totalParticipating}`;
            if (rawTime) {
              setTimer(rawTime);
            }

            allRows.sort((a, b) => {
              const rA = parseInt(a.rank) || 999;
              const rB = parseInt(b.rank) || 999;
              if (rA !== rB) return rA - rB;

              const ptsA = parseInt(a.pts) || 0;
              const ptsB = parseInt(b.pts) || 0;
              if (ptsA !== ptsB) return ptsB - ptsA;

              return parseInt(a.slot) - parseInt(b.slot);
            });

            if (document.startViewTransition) {
              document.startViewTransition(() => renderSeparatedSidebars(allRows));
            } else {
              renderSeparatedSidebars(allRows);
            }
          }
        });
      } catch (e) { console.error("Sync Error:", e); }
    }

    function renderSeparatedSidebars(rows) {
      const left = document.getElementById('list-left');
      const right = document.getElementById('list-right');

      const existingLeft = Array.from(left.children);
      const existingRight = Array.from(right.children);
      const nodeMap = new Map();
      existingLeft.forEach(node => nodeMap.set(node.dataset.id, node));
      existingRight.forEach(node => nodeMap.set(node.dataset.id, node));

      let leftIndex = 0;
      let rightIndex = 0;

      rows.forEach((row) => {
        const isAlive = row.alive > 0;
        let pips = '';
        for (let p = 0; p < 4; p++) pips += `<span class="w-1.5 h-3 ${p < row.alive ? 'bg-primary' : (isAlive ? 'bg-primary/10' : 'bg-red-900/40')} transition-colors duration-300"></span>`;

        const displayId = (row.rank && row.rank !== '') ? row.rank : row.slot;
        const rankColor = isAlive ? 'text-primary' : 'text-red-500/60';
        const ptsColor = isAlive ? 'text-on-surface' : 'text-red-500/80';
        const nameColor = isAlive ? 'text-on-surface' : 'text-red-100/50';

        const className = `grid grid-cols-[30px_1fr_36px] items-center px-4 py-2 mb-[2px] transition-all duration-500 ${isAlive ? 'bg-white/5 border-l-2 border-primary' : 'bg-red-900/10 border-r-2 border-red-800'}`;

        const uniLogoPath = window.getUniLogo ? window.getUniLogo(row.name) : null;
        const cleanName = window.cleanTeamName ? window.cleanTeamName(row.name) : row.name;
        const uniImgTag = uniLogoPath ? `<img class="w-4 h-4 object-contain transition-opacity duration-300 mr-[-4px]" src="${uniLogoPath}" onerror="this.style.display='none'">` : '';

        const innerContent = `
            <div class="${rankColor} font-black text-xs italic transition-colors duration-300">#${displayId}</div>
            <div class="flex items-center gap-2">
              ${uniImgTag}
              <img class="w-6 h-6 object-contain transition-opacity duration-300" src="team_logos/${row.logo}.png" onerror="this.style.opacity=${isAlive ? 1 : 0.4}">
              <div class="flex flex-col gap-0">
                <span class="text-[11px] font-black uppercase ${nameColor} tracking-tighter leading-none transition-colors duration-300 truncate w-[75px]" title="${cleanName}">${cleanName}</span>
                <div class="flex gap-1 mt-1">${pips}</div>
              </div>
            </div>
            <div class="text-right text-sm tabular-nums font-black ${ptsColor} transition-colors duration-300">${row.pts}</div>
        `;

        const safeId = (row.name || '').replace(/[^a-zA-Z0-9]/g, '_') + '_' + row.slot;
        let node = nodeMap.get(safeId);

        if (!node) {
          node = document.createElement('div');
          node.dataset.id = safeId;
          node.style.viewTransitionName = `team_${safeId}`;
          node.className = className;
          node.innerHTML = innerContent;
        } else {
          const oldPts = node.dataset.pts;
          if (oldPts && oldPts !== row.pts.toString()) {
            if (isAlive) {
              node.classList.add('bg-white/20');
              setTimeout(() => node.classList.remove('bg-white/20'), 600);
            }
          }
          if (node.innerHTML !== innerContent) node.innerHTML = innerContent;
          if (node.className !== className) node.className = className;
          nodeMap.delete(safeId);
        }
        node.dataset.pts = row.pts;

        const targetContainer = isAlive ? left : right;
        const targetIndex = isAlive ? leftIndex : rightIndex;

        if (targetContainer.children[targetIndex] !== node) {
          targetContainer.insertBefore(node, targetContainer.children[targetIndex]);
        }

        if (isAlive) leftIndex++;
        else rightIndex++;
      });

      nodeMap.forEach(node => node.remove());
    }

    function update(rawData) {
      const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
      if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
      if (data.f1) document.getElementById('f1').innerText = data.f1.toUpperCase();
      if (data.f3 && !data.f5) setTimer(data.f3);

      if (data.f5 && data.f5.startsWith('http')) {
        if (sheetInterval) clearInterval(sheetInterval);
        fetchSheet(data.f5);
        sheetInterval = setInterval(() => fetchSheet(data.f5), 3500);
      }
    }

    function play() {
      document.getElementById('wrapper').style.opacity = '1';
      document.getElementById('sidebar-left').classList.add('animate-left');
      document.getElementById('sidebar-right').classList.add('animate-right');
    }
    function stop() { document.getElementById('wrapper').style.opacity = '0'; }

    window.SPXGCTemplateDefinition = {
      "description": "Dual Sidebar - Surviving vs Dead",
      "playserver": "OVERLAY", "playchannel": "1", "playlayer": "4", "webplayout": "4",
      "out": "manual", "uicolor": "2",
      "DataFields": [
        { "field": "f5", "ftype": "textfield", "title": "Spreadsheet URL", "value": "" },
        { "field": "f0", "ftype": "textfield", "title": "Main Title", "value": "BATTLEGROUNDS" },
        { "field": "f1", "ftype": "textfield", "title": "Phase Info", "value": "UOM | UOK" },
        { "field": "f3", "ftype": "textfield", "title": "Manual Timer", "value": "00:00" }
      ]
    };
  </script>
</body>

</html>
