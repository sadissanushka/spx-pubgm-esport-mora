<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Top Elims</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#adc6ff",
                        "secondary": "#ffb690",
                        "surface-dim": "#0b1326",
                        "surface-container": "#171f33",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "surface-container-high": "#222a3d",
                    }
                }
            }
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fragger-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 1600px;
        }
        .fragger-card {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 16px;
            border-bottom: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .fragger-card:first-child { border-bottom-color: #ffb690; background: rgba(45, 52, 73, 0.95); }
        .fragger-portrait {
            width: 100%; height: 350px;
            object-fit: contain; object-position: bottom;
            margin-top: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .fragger-info {
            width: 100%;
            background: rgba(11, 19, 38, 0.9);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-card { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div class="mb-14 flex items-center justify-between w-[1600px] border-b-2 border-secondary pb-4">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1;">skull</span>
                <h1 id="f0" class="font-black text-6xl uppercase italic tracking-tighter">MATCH KILL LEADERS</h1>
            </div>
            <div class="text-secondary font-bold tracking-widest uppercase opacity-60">DAY 02 / MATCH 08</div>
        </div>

        <div id="fragger-list" class="fragger-grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                
                let fraggers = [];
                if (data.f1) {
                    fraggers = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                } else {
                    // Placeholder data for preview
                    fraggers = [
                        {"name":"TITAN_REX","team":"TITAN","kills":8,"portrait":"1"},
                        {"name":"EPIC_BOY","team":"EPIC","kills":6,"portrait":"2"},
                        {"name":"ALPHA_ACE","team":"AUT","kills":5,"portrait":"3"},
                        {"name":"GLOBAL_X","team":"GS","name":"GLOBAL_X","kills":5,"portrait":"4"},
                        {"name":"ABN_LORD","team":"ABN","kills":4,"portrait":"5"}
                    ];
                }

                const list = document.getElementById('fragger-list');
                list.innerHTML = '';
                
                fraggers.forEach((player, index) => {
                    const card = document.createElement('div');
                    card.className = `fragger-card animate-card`;
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    let pPath = player.portrait;
                    if (!pPath.includes('/')) pPath = 'images/characters/' + pPath;
                    if (!pPath.includes('.')) pPath += '.png';

                    let tPath = player.team;
                    if (!tPath.includes('/')) tPath = 'team_logos/' + tPath;
                    if (!tPath.includes('.')) tPath += '.png';

                    card.innerHTML = `
                        <img src="${pPath}" class="fragger-portrait" onerror="this.style.opacity=0">
                        <div class="fragger-info">
                            <img src="${tPath}" class="h-8 object-contain mb-2" onerror="this.style.opacity=0">
                            <span class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">${player.team}</span>
                            <span class="text-xl font-black uppercase italic">${player.name}</span>
                            <div class="mt-4 flex items-baseline gap-2">
                                <span class="text-4xl font-black text-secondary">${player.kills}</span>
                                <span class="text-xs font-bold text-on-surface-variant tracking-widest">KILLS</span>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
                
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Match Kill Leaders",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "14",
            "webplayout": "14",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "8",
            "DataFields": [
                { "field": "f0", "ftype": "textfield", "title": "Heading", "value": "MATCH KILL LEADERS" },
                { "field": "f1", "ftype": "textfield", "title": "JSON Data", "value": '[{"name":"TITAN_REX","team":"titan","kills":8,"portrait":"1"},{"name":"EPIC_BOY","team":"epic","kills":6,"portrait":"2"}]' }
            ]
        };
    </script>
</body>
</html>
