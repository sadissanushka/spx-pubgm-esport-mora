<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Match Ranking</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",

                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",

                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",

                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",

    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; }
        .ranking-container {
            position: absolute;
            right: 50px; top: 100px;
            width: 400px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .header {
            background: #ffb690;
            color: #552100;
            padding: 10px 20px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .ranking-row {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 12px;
            padding: 10px 15px;
            display: flex; align-items: center; gap: 15px;
            border-right: 4px solid transparent;
        }
        .ranking-row.top-3 { border-right-color: #ffb690; background: rgba(45, 52, 73, 0.95); }
        .rank-num { width: 30px; font-weight: 900; color: #ffb690; font-style: italic; text-align: center; }
        .team-logo { height: 30px; width: 30px; object-fit: contain; }
        .team-name { flex-grow: 1; font-weight: 700; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; color: #dae2fd; }
        .team-pts { font-weight: 900; color: #adc6ff; font-variant-numeric: tabular-nums; }
        @keyframes slideInLeft {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-rank { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div id="ranking" class="ranking-container shadow-2xl">
            <div class="header">
                <span>RANKINGS</span>
                <span class="material-symbols-outlined text-sm">trending_up</span>
            </div>
            <div id="rank-list">
                <!-- Top 10-16 injected here -->
            </div>
            <!-- Accents -->
            <div class="h-1 bg-secondary opacity-30 mt-2"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="uni_mapper.js"></script>
    <script>
        let pollTimer;
        let sheetURL = '';

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                // Avoid caching by adding timestamp if it's an export link
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');
                
                const response = await fetch(cleanUrl + '&t=' + new Date().getTime());
                const csvText = await response.text();
                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const lines = results.data;
                        if (lines.length < 2) return;

                        let allTeams = lines.slice(2, 27).map(cols => {
                            if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;
                            const r = parseInt(cols[9]) || 999; // Rank is column J
                            return {
                                slot: cols[0]?.trim() || '0', 
                                name: cols[1]?.trim() || '', 
                                logo: cols[2]?.trim() || '',
                                pts: parseInt(cols[10]?.trim()) || 0, // Points is column K
                                rank: r
                            };
                        }).filter(r => r !== null);

                        // Sort by rank and take top 10
                        allTeams.sort((a, b) => a.rank - b.rank);
                        const top10 = allTeams.slice(0, 10);
                        renderRankings(top10);
                    }
                });
            } catch (e) {
                console.error("Sheet Error:", e);
            }
        }

        function renderRankings(rankings) {
            const list = document.getElementById('rank-list');
            
            // Only re-render if something changed (very basic diffing by stringifying)
            const newHTML = rankings.map((team, index) => {
                let logoPath = team.logo;
                if (!logoPath.includes('/')) logoPath = 'team_logos/' + logoPath;
                if (!logoPath.includes('.')) logoPath += '.png';
                
                const uniLogoPath = window.getUniLogo ? window.getUniLogo(team.name) : null;
                const cleanName = window.cleanTeamName ? window.cleanTeamName(team.name) : team.name;
                const uniImgTag = uniLogoPath ? `<img src="${uniLogoPath}" class="team-logo mr-1" onerror="this.style.display='none'">` : '';
                
                const isTop3 = team.rank <= 3 ? 'top-3' : '';
                return `
                    <div class="ranking-row animate-rank ${isTop3}" style="animation-delay: ${index * 0.05}s">
                        <div class="rank-num">${team.rank}</div>
                        <div class="flex items-center w-full">
                            ${uniImgTag}
                            <img src="${logoPath}" class="team-logo mr-2 opacity-90" onerror="this.style.opacity=0">
                            <span class="team-name truncate pr-2 w-[110px]" title="${cleanName}">${cleanName}</span>
                        </div>
                        <span class="team-pts">${team.pts}</span>
                    </div>
                `;
            }).join("");

            if (list.innerHTML !== newHTML) {
                list.innerHTML = newHTML;
            }
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                
                if (data.f7 && data.f7.startsWith('http')) {
                    sheetURL = data.f7;
                    fetchSheet(sheetURL);
                    if (!pollTimer) {
                        pollTimer = setInterval(() => fetchSheet(sheetURL), 5000);
                    }
                } else if (data.f1) {
                    // Fallback to manual JSON if necessary
                    let rankings = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                    renderRankings(rankings);
                }
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() { document.getElementById('wrapper').style.opacity = '1'; }
        function stop() { 
            document.getElementById('wrapper').style.opacity = '0'; 
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = null;
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Live Match Ranking",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "7", "webplayout": "7",
            "out": "manual", "dataformat": "json", "uicolor": "12",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL", "value": "" },
                { "field": "f1", "ftype": "textfield", "title": "Manual JSON Fallback", "value": "[]" }
            ]
        };
    </script>
</body>
</html>
