<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Match Result</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3d",
                        "surface-container": "#171f33",
                        "outline": "#8c909f",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#001a42",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#adc6ff",
                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#272a2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }

    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .table-card { width: 1200px; }
        .table-row {
            display: grid;
            grid-template-columns: 80px 100px 1fr 120px 120px 120px;
            gap: 2px;
            margin-bottom: 2px;
            align-items: center;
        }
        .header-row {
            background: #ffb690;
            color: #552100;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 10px 0;
            font-style: italic;
        }
        .data-row {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 16px;
            color: #dae2fd;
            font-weight: 700;
            padding: 10px 0;
            border-left: 4px solid transparent;
        }
        .data-row:nth-child(even) { background: rgba(23, 31, 51, 0.85); }
        .data-row.winner { border-left-color: #ffb690; background: rgba(45, 52, 73, 0.95); }
        .rank-cell { text-align: center; font-size: 22px; color: #ffb690; }
        .logo-cell { display: flex; justify-content: center; align-items: center; }
        .logo-cell img { height: 30px; width: 40px; object-fit: contain; }
        .name-cell { padding-left: 20px; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        .stat-cell { text-align: center; font-size: 20px; }
        .total-cell { color: #adc6ff; font-weight: 900; font-size: 22px; }
    </style>
</head>
<body class="bg-transparent font-body">
    <div id="wrapper">
        <div class="table-card">
            <div class="mb-10 w-full border-b-2 border-secondary pb-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-secondary text-5xl">inventory</span>
                    <h1 id="f0" class="text-on-surface font-black text-5xl uppercase italic tracking-tighter">MATCH RESULT</h1>
                </div>
                <div id="f2" class="text-secondary font-bold tracking-widest uppercase opacity-60">MACTH 08 / DAY 02</div>
            </div>

            <div class="table-row header-row">
                <div class="rank-cell">RANK</div>
                <div class="logo-cell">LOGO</div>
                <div class="name-cell">TEAM NAME</div>
                <div class="stat-cell">PLACE</div>
                <div class="stat-cell">KILLS</div>
                <div class="stat-cell">POINTS</div>
            </div>

            <div id="table-body">
                <!-- Rows injected here -->
            </div>
        </div>
    </div>

    <script>
        let sheetInterval = null;

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

                const response = await fetch(cleanUrl);
                const csvText = await response.text();
                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const lines = results.data;
                        if (lines.length < 2) return;

                        const teams = lines.slice(2, 27).map(cols => {
                            if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;
                            return {
                                name: cols[1].trim(),
                                logo: cols[2]?.trim() || '',
                                kills: parseInt(cols[8]?.trim()) || 0,
                                rank: parseInt(cols[9]?.trim()) || 999,
                                total: parseInt(cols[10]?.trim()) || 0,
                                slot: parseInt(cols[0]?.trim()) || 999
                            };
                        }).filter(t => t !== null);

                        processTeams(teams);
                    }
                });
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function processTeams(teams) {
            // Sort by Rank > Points > Slot
            let sorted = [...teams].sort((a,b) => {
                if (a.rank !== b.rank) return a.rank - b.rank;
                if (a.total !== b.total) return b.total - a.total;
                return a.slot - b.slot;
            });
            
            const body = document.getElementById('table-body');
            const targetCount = Math.min(16, sorted.length);
            
            while (body.children.length < targetCount) {
                body.appendChild(document.createElement('div'));
            }
            while (body.children.length > targetCount) {
                body.removeChild(body.lastChild);
            }
            
            sorted.slice(0, targetCount).forEach((team, index) => {
                const row = body.children[index];
                const newClass = `table-row data-row ${team.rank === 1 ? 'winner' : ''}`;
                if (row.className !== newClass) row.className = newClass;
                
                let logoPath = team.logo;
                if (!logoPath.includes('/')) logoPath = 'team_logos/' + logoPath;
                if (!logoPath.includes('.')) logoPath += '.png';

                let placePts = team.total - team.kills;
                if (placePts < 0) placePts = 0;

                const newHTML = `
                    <div class="rank-cell">#${team.rank === 999 ? '-' : team.rank}</div>
                    <div class="logo-cell"><img src="${logoPath}" onerror="this.style.opacity=0"></div>
                    <div class="name-cell">${team.name}</div>
                    <div class="stat-cell">${placePts}</div>
                    <div class="stat-cell">${team.kills}</div>
                    <div class="stat-cell total-cell">${team.total}</div>
                `;
                
                if (row.innerHTML !== newHTML) {
                    row.innerHTML = newHTML;
                }
            });
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                if (data.f2) document.getElementById('f2').innerText = data.f2.toUpperCase();
                
                if (data.f7 && data.f7.startsWith('http')) {
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 5000);
                } else {
                    let teams = [];
                    if (data.f1) {
                        teams = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                    } else {
                        teams = [
                            {"rank":1,"logo":"titan","name":"TEAM TITANS","place":15,"kills":18,"total":33},
                            {"rank":2,"logo":"epic","name":"EPIC ESPORTS","place":12,"kills":6,"total":18},
                            {"rank":3,"logo":"aut","name":"ALPHA UT","place":10,"kills":8,"total":18},
                            {"rank":4,"logo":"gs","name":"GLOBAL STARS","place":8,"kills":7,"total":15},
                            {"rank":5,"logo":"abn","name":"ABN OFFICIAL","place":6,"kills":5,"total":11}
                        ];
                    }

                    const body = document.getElementById('table-body');
                    const targetCount = teams.length;
                    
                    while (body.children.length < targetCount) {
                        body.appendChild(document.createElement('div'));
                    }
                    while (body.children.length > targetCount) {
                        body.removeChild(body.lastChild);
                    }
                    
                    teams.forEach((team, index) => {
                        const row = body.children[index];
                        const newClass = `table-row data-row ${team.rank === 1 ? 'winner' : ''}`;
                        if (row.className !== newClass) row.className = newClass;
                        
                        let logoPath = team.logo;
                        if (!logoPath.includes('/')) logoPath = 'team_logos/' + logoPath;
                        if (!logoPath.includes('.')) logoPath += '.png';

                        const newHTML = `
                            <div class="rank-cell">#${team.rank}</div>
                            <div class="logo-cell"><img src="${logoPath}" onerror="this.style.opacity=0"></div>
                            <div class="name-cell">${team.name}</div>
                            <div class="stat-cell">${team.place}</div>
                            <div class="stat-cell">${team.kills}</div>
                            <div class="stat-cell total-cell">${team.total}</div>
                        `;
                        
                        if (row.innerHTML !== newHTML) {
                            row.innerHTML = newHTML;
                        }
                    });
                }
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() { document.getElementById('wrapper').style.opacity = '1'; }
        function stop() { document.getElementById('wrapper').style.opacity = '0'; }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Match Result Table",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "13", "webplayout": "13",
            "out": "manual", "dataformat": "json", "uicolor": "10",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f0", "ftype": "textfield", "title": "Heading", "value": "MATCH RESULT" },
                { "field": "f2", "ftype": "textfield", "title": "Subheading", "value": "MATCH 08 / DAY 02" },
                { "field": "f1", "ftype": "textfield", "title": "JSON Data", "value": '[{"rank":1,"logo":"titan","name":"TEAM TITANS","place":15,"kills":18,"total":33}]' }
            ]
        };
    </script>
</body>
</html>
