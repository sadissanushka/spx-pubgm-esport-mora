<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Map Overlay</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#adc6ff",
                        "secondary": "#ffb690",
                        "surface-dim": "#0b1326",
                        "surface-container": "#171f33",
                        "on-surface": "#dae2fd",
                    }
                }
            }
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; }
        .map-widget {
            position: absolute;
            top: 50px; left: 50px;
            width: 380px;
            background: rgba(11, 19, 38, 0.85);
            backdrop-blur: 16px;
            border-left: 4px solid #ffb690;
            display: flex;
            flex-direction: column;
            gap: 1px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .widget-header {
            background: #ffb690;
            color: #552100;
            padding: 8px 15px;
            font-weight: 950;
            font-style: italic;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .widget-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        .stat-label {
            color: rgba(218, 226, 253, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            color: #dae2fd;
            font-size: 20px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-transparent font-body">
    <div id="wrapper">
        <div id="widget" class="map-widget">
            <div class="widget-header">
                <span>MATCH INFO</span>
                <span id="f0" class="opacity-80">ERANGEL</span>
            </div>
            <div class="widget-content">
                <div class="stat-line">
                    <span class="stat-label">ALIVE</span>
                    <span id="f1" class="stat-value text-secondary">64</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">TEAMS</span>
                    <span id="f2" class="stat-value">16</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">ZONE PHASE</span>
                    <span id="f3" class="stat-value text-primary">04</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">NEXT CIRCLE</span>
                    <span id="f4" class="stat-value">01:45</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">CLOSING IN</span>
                    <span id="f5" class="stat-value text-secondary">-</span>
                </div>
            </div>
            <!-- Accents -->
            <div class="flex">
                <div class="h-1 flex-grow bg-secondary opacity-50"></div>
                <div class="h-1 w-10 bg-secondary"></div>
            </div>
        </div>
    </div>

    <script>
        let sheetInterval = null;

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

                const response = await fetch(cleanUrl);
                const csv = await response.text();
                if (csv.includes('<!DOCTYPE html>')) return;
                
                const rawLines = csv.split('\n');
                if (rawLines.length < 2) return;

                let playersAlive = 0;
                let teamsAlive = 0;

                rawLines.slice(2, 30).forEach(line => {
                    const cols = line.split(',');
                    const teamName = cols[1]?.trim() || "";
                    if (!cols[1] || teamName === "" || teamName === "TeamName") return;
                    
                    const p1 = cols[4]?.trim().toUpperCase() === 'TRUE';
                    const p2 = cols[5]?.trim().toUpperCase() === 'TRUE';
                    const p3 = cols[6]?.trim().toUpperCase() === 'TRUE';
                    const p4 = cols[7]?.trim().toUpperCase() === 'TRUE';
                    
                    const aliveCount = (p1?1:0) + (p2?1:0) + (p3?1:0) + (p4?1:0);
                    if (aliveCount > 0) {
                        teamsAlive++;
                        playersAlive += aliveCount;
                    }
                });

                const countEl1 = document.getElementById('f1');
                const countEl2 = document.getElementById('f2');
                if (playersAlive > 0) countEl1.innerText = (playersAlive < 10 ? '0' : '') + playersAlive;
                if (teamsAlive > 0) countEl2.innerText = (teamsAlive < 10 ? '0' : '') + teamsAlive;

                // Headers logic (Zone Phase, Times)
                const headers = rawLines[0].split(',');
                if (headers.length > 8 && headers[8]) {
                    const phaseStr = headers[8].trim();
                    if (phaseStr) document.getElementById('f3').innerText = phaseStr;
                }
                if (headers.length > 10 && headers[10]) {
                    const nextStr = headers[10].trim();
                    if (nextStr) document.getElementById('f4').innerText = nextStr;
                }
                if (headers.length > 11 && headers[11]) {
                    const closeStr = headers[11].trim();
                    document.getElementById('f5').innerText = closeStr !== '' ? closeStr : '-';
                }

                // Row 32 -> Index 31 (Maps)
                // Row 33 -> Index 32 (Selected Map Index in B33 / Index 1)
                if (rawLines.length > 32) {
                    const selectRow = rawLines[32].split(',');
                    const b33Value = parseInt(selectRow[1]?.trim());
                    if (!isNaN(b33Value) && b33Value >= 1 && b33Value <= 7) {
                        const mapsRow = rawLines[31].split(',');
                        const mapName = mapsRow[b33Value]?.trim();
                        if (mapName) {
                             document.getElementById('f0').innerText = mapName.toUpperCase();
                        }
                    }
                }
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                if (data.f1) document.getElementById('f1').innerText = data.f1;
                if (data.f2) document.getElementById('f2').innerText = data.f2;
                if (data.f3) document.getElementById('f3').innerText = data.f3;
                if (data.f4) document.getElementById('f4').innerText = data.f4;
                if (data.f5) document.getElementById('f5').innerText = data.f5;
                
                if (data.f7 && data.f7.startsWith('http')) {
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 3500);
                }
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Match Info Overlay",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "5",
            "webplayout": "5",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "7",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f0", "ftype": "textfield", "title": "Map Name (Manual Overide)", "value": "ERANGEL" },
                { "field": "f1", "ftype": "textfield", "title": "Players Alive (Manual Override)", "value": "64" },
                { "field": "f2", "ftype": "textfield", "title": "Teams Alive (Manual Override)", "value": "16" },
                { "field": "f3", "ftype": "textfield", "title": "Phase", "value": "04" },
                { "field": "f4", "ftype": "textfield", "title": "Zone Time", "value": "01:45" },
                { "field": "f5", "ftype": "textfield", "title": "Closing Time", "value": "-" }
            ]
        };
    </script>
</body>
</html>
