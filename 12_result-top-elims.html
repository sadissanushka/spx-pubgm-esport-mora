<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Top Elims</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="uni_mapper.js"></script>
    <script id="tailwind-config">

                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",

                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",

                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",

                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",

                        "on-secondary-fixed": "#341100",

    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fragger-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 1600px;
        }
        .fragger-card {
            background: rgba(34, 42, 61, 0.85);
            backdrop-blur: 16px;
            border-bottom: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .fragger-card:first-child { border-bottom-color: #ffb690; background: rgba(45, 52, 73, 0.95); }
        .fragger-portrait {
            width: 100%; height: 350px;
            object-fit: contain; object-position: bottom;
            margin-top: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .fragger-info {
            width: 100%;
            background: rgba(11, 19, 38, 0.9);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-card { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div class="mb-14 flex items-center justify-between w-[1600px] border-b-2 border-secondary pb-4">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1;">skull</span>
                <h1 id="f0" class="font-black text-6xl uppercase italic tracking-tighter">MATCH KILL LEADERS</h1>
            </div>
            <div class="text-secondary font-bold tracking-widest uppercase opacity-60">UOM | UOK</div>
        </div>

        <div id="fragger-list" class="fragger-grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        let sheetInterval = null;

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                let docIdMatch = cleanUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                let csvText = null;

                if (docIdMatch) {
                    let docId = docIdMatch[1];
                    let teamsUrl = `https://docs.google.com/spreadsheets/d/${docId}/gviz/tq?tqx=out:csv&sheet=Teams`;
                    try {
                        const res = await fetch(teamsUrl);
                        const txt = await res.text();
                        if (!txt.includes('<!DOCTYPE html>') && txt.includes(',')) {
                            csvText = txt;
                        }
                    } catch (e) {}
                }

                if (!csvText) {
                    if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                    if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');
                    const response = await fetch(cleanUrl);
                    csvText = await response.text();
                }

                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const lines = results.data;
                        if (lines.length < 2) return;

                        const teams = lines.slice(1, 26).map(cols => {
                            if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;
                            return {
                                name: cols[1].trim(),
                                logo: cols[2]?.trim() || '',
                                kills: parseInt(cols[12]?.trim()) || 0
                            };
                        }).filter(t => t !== null);

                        processTeams(teams);
                    }
                });
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function processTeams(teams) {
            let sorted = [...teams].sort((a, b) => b.kills - a.kills).slice(0, 5);
            
            const list = document.getElementById('fragger-list');
            if (list.children.length === 0) {
                for (let i = 0; i < 5; i++) {
                    const card = document.createElement('div');
                    card.className = `fragger-card animate-card`;
                    card.style.animationDelay = `${i * 0.1}s`;
                    list.appendChild(card);
                }
            }
            
            sorted.forEach((team, index) => {
                const card = list.children[index];
                if (!card) return;
                
                let tPath = team.logo;
                if (!tPath.includes('/')) tPath = 'team_logos/' + tPath;
                if (!tPath.includes('.')) tPath += '.png';

                const uniLogoPath = window.getUniLogo ? window.getUniLogo(team.name) : null;
                const cleanName = window.cleanTeamName ? window.cleanTeamName(team.name) : team.name;
                const uniImgTag = uniLogoPath ? `<img src="${uniLogoPath}" style="max-width:140px; max-height:140px; object-fit:contain; filter:drop-shadow(0 0 20px rgba(0,0,0,0.8));" onerror="this.style.display='none'">` : '';

                const newHTML = `
                    <div style="width:100%; height:350px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 40px; background: radial-gradient(circle, rgba(255,182,144,0.1) 0%, transparent 60%); gap: 30px;">
                       ${uniImgTag}
                       <img src="${tPath}" style="max-width:140px; max-height:140px; object-fit:contain; filter:drop-shadow(0 0 20px rgba(0,0,0,0.8));" onerror="this.style.opacity=0">
                    </div>
                    <div class="fragger-info" style="border-top: 2px solid rgba(255,255,255,0.1);">
                        <span class="text-xl font-black uppercase italic tracking-widest text-center h-7 truncate w-full" title="${cleanName}">${cleanName}</span>
                        <div class="mt-4 flex items-baseline gap-2">
                            <span class="text-4xl font-black text-secondary">${team.kills}</span>
                            <span class="text-xs font-bold text-on-surface-variant tracking-widest">TEAM KILLS</span>
                        </div>
                    </div>
                `;
                
                if (card.innerHTML !== newHTML) {
                    card.innerHTML = newHTML;
                }
            });
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                
                if (data.f7 && data.f7.startsWith('http')) {
                    if (sheetInterval) clearInterval(sheetInterval);
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 5000);
                } else {
                    let fraggers = [];
                    if (data.f1) {
                        fraggers = typeof data.f1 === 'string' ? JSON.parse(data.f1) : data.f1;
                    } else {
                        fraggers = [
                            {"name":"TEAM TITANS","team":"titan","kills":18,"portrait":""},
                            {"name":"EPIC","team":"epic","kills":6,"portrait":""},
                            {"name":"ALPHA","team":"aut","kills":5,"portrait":""},
                            {"name":"GLOBAL","team":"gs","kills":5,"portrait":""},
                            {"name":"ABN","team":"abn","kills":4,"portrait":""}
                        ];
                    }

                    const list = document.getElementById('fragger-list');
                    if (list.children.length === 0) {
                        for (let i = 0; i < 5; i++) {
                            const card = document.createElement('div');
                            card.className = `fragger-card animate-card`;
                            card.style.animationDelay = `${i * 0.1}s`;
                            list.appendChild(card);
                        }
                    }
                    
                    fraggers.forEach((player, index) => {
                        const card = list.children[index];
                        if (!card) return;
                        
                        let tPath = player.team;
                        if (!tPath.includes('/')) tPath = 'team_logos/' + tPath;
                        if (!tPath.includes('.')) tPath += '.png';

                        const uniLogoPath = window.getUniLogo ? window.getUniLogo(player.name) : null;
                        const cleanName = window.cleanTeamName ? window.cleanTeamName(player.name) : player.name;
                        const uniImgTag = uniLogoPath ? `<img src="${uniLogoPath}" style="max-width:140px; max-height:140px; object-fit:contain; filter:drop-shadow(0 0 20px rgba(0,0,0,0.8));" onerror="this.style.display='none'">` : '';

                        const newHTML = `
                            <div style="width:100%; height:350px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 40px; background: radial-gradient(circle, rgba(255,182,144,0.1) 0%, transparent 60%); gap: 30px;">
                               ${uniImgTag}
                               <img src="${tPath}" style="max-width:140px; max-height:140px; object-fit:contain; filter:drop-shadow(0 0 20px rgba(0,0,0,0.8));" onerror="this.style.opacity=0">
                            </div>
                            <div class="fragger-info" style="border-top: 2px solid rgba(255,255,255,0.1);">
                                <span class="text-xl font-black uppercase italic tracking-widest text-center h-7 truncate w-full" title="${cleanName}">${cleanName}</span>
                                <div class="mt-4 flex items-baseline gap-2">
                                    <span class="text-4xl font-black text-secondary">${player.kills}</span>
                                    <span class="text-xs font-bold text-on-surface-variant tracking-widest">TEAM KILLS</span>
                                </div>
                            </div>
                        `;
                        
                        if (card.innerHTML !== newHTML) {
                            card.innerHTML = newHTML;
                        }
                    });
                }
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Match Kill Leaders",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "14",
            "webplayout": "14",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "8",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f0", "ftype": "textfield", "title": "Heading", "value": "MATCH KILL LEADERS" },
                { "field": "f1", "ftype": "textfield", "title": "JSON Data", "value": '[{"name":"TEAM TITANS","team":"titan","kills":18},{"name":"EPIC ESPORTS","team":"epic","kills":6}]' }
            ]
        };
    </script>
</body>
</html>
