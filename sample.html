<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SPX - Champion Winner Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#adc6ff", "secondary": "#ffb690", "on-surface": "#dae2fd" } } }
        }
    </script>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
        }

        #wrapper {
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.1);
        }

        #wrapper.active {
            opacity: 1;
            transform: scale(1);
        }

        .winner-glass {
            background: linear-gradient(135deg, rgba(147, 0, 10, 0.95) 0%, rgba(11, 19, 38, 0.98) 100%);
            backdrop-filter: blur(20px);
        }

        .gold-glow {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }
    </style>
</head>

<body class="flex items-center justify-center">
    <div id="wrapper"
        class="w-[800px] winner-glass border-t-8 border-primary p-12 shadow-[0_0_100px_rgba(0,0,0,0.5)] relative overflow-hidden shine-effect">
        <!-- BACKGROUND ACCENT -->
        <div class="absolute -right-10 -bottom-10 text-[180px] font-black text-white/5 italic select-none">#1</div>

        <div class="relative z-10 flex flex-col items-center text-center">
            <!-- TROPHY ICON / LABEL -->
            <div class="bg-primary text-black px-4 py-1 text-xs font-black uppercase tracking-[0.4em] mb-4">Winner
                Winner Chicken Dinner</div>

            <div class="flex items-center gap-12">
                <!-- CHAMPION LOGO -->
                <div class="w-48 h-48 bg-black/40 flex items-center justify-center border-2 border-primary/30 p-4">
                    <img id="team-logo" src="" class="w-full h-full object-contain filter drop-shadow-2xl"
                        onerror="this.style.opacity=0">
                </div>

                <!-- STATS AREA -->
                <div class="flex flex-col items-start text-left">
                    <h1 id="team-name"
                        class="text-7xl font-black text-white tracking-widest uppercase leading-none gold-glow mb-2">
                        TEAM NAME</h1>
                    <div class="flex gap-8 mt-4 border-l-4 border-primary pl-6">
                        <div>
                            <p class="text-[10px] text-primary font-bold uppercase tracking-widest">Total Match Points
                            </p>
                            <p id="team-pts" class="text-4xl font-black text-white italic">0</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Team Slot</p>
                            <p id="team-slot" class="text-4xl font-black text-gray-500 italic">#0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FOOTER DECOR -->
            <div class="mt-12 w-full h-px bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
        </div>
    </div>

    <script>
        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

                const response = await fetch(cleanUrl);
                const csv = await response.text();
                const lines = csv.split('\n').filter(l => l.trim().includes(','));

                // Find the team with Rank #1
                const winner = lines.slice(2).map(line => {
                    const cols = line.split(',');
                    return {
                        slot: cols[0]?.trim(),
                        name: cols[1]?.trim(),
                        logo: cols[2]?.trim(),
                        pts: cols[10]?.trim() || '0',
                        rank: cols[9]?.trim()
                    };
                }).find(t => t.rank === "1" || t.rank === "01");

                if (winner) {
                    document.getElementById('team-name').innerText = winner.name;
                    document.getElementById('team-logo').src = `team_logos/${winner.logo}.png`;
                    document.getElementById('team-pts').innerText = winner.pts;
                    document.getElementById('team-slot').innerText = `#${winner.slot}`;
                }
            } catch (e) { console.error("Winner Sync Error"); }
        }

        function update(rawData) {
            const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
            if (data.f5) fetchSheet(data.f5);
        }

        function play() { document.getElementById('wrapper').classList.add('active'); }
        function stop() { document.getElementById('wrapper').classList.remove('active'); }

        window.SPXGCTemplateDefinition = {
            "description": "Premium Winner Screen (Auto-Scans Rank 1)",
            "playserver": "OVERLAY", "playchannel": "1", "playlayer": "20", "webplayout": "20",
            "out": "manual", "uicolor": "2",
            "DataFields": [
                { "field": "f5", "ftype": "textfield", "title": "Spreadsheet URL", "value": "" }
            ]
        };
    </script>
</body>

</html>
