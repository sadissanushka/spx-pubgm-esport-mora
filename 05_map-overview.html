<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPX - PUBG Mobile - Map Overview</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3d",
                        "surface-container": "#171f33",
                        "outline": "#8c909f",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-container": "#4a1c00",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-dim": "#0b1326",
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary": "#552100",
                        "tertiary": "#c4c7c9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#ec6a06",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#2d3133",
                        "on-primary-container": "#00285d",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-on-surface": "#283044",
                        "on-primary": "#002e6a",
                        "surface": "#0b1326",
                        "outline-variant": "#424754",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#8e9193",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#001a42",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#adc6ff",
                        "on-secondary-fixed": "#341100",
                        "background": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#272a2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; margin: 0; }
        #wrapper { opacity: 0; transition: opacity 1s ease; width: 100%; height: 100%; }
        .map-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 1400px; height: 800px;
            background: rgba(11, 19, 38, 0.4);
            backdrop-blur: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
        }
        .map-image { width: 800px; height: 800px; background: #000; overflow: hidden; position: relative; }
        .map-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .map-sidebar {
            flex-grow: 1;
            padding: 40px;
            background: rgba(11, 19, 38, 0.9);
            border-left: 4px solid #ffb690;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .flight-path {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .flight-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            height: 2px;
            transform-origin: left;
        }
    </style>
</head>
<body class="bg-transparent font-body text-on-surface">
    <div id="wrapper">
        <div class="map-container shadow-2xl">
            <div class="map-image">
                <img id="map-asset" src="images/maps/erangel.jpeg" alt="">
                <div class="absolute inset-0 bg-gradient-to-r from-transparent to-surface-dim"></div>
                <!-- Flight Path Placeholder -->
                <div class="flight-path">
                    <svg width="100%" height="100%" viewBox="0 0 800 800">
                        <line x1="100" y1="100" x2="700" y2="700" stroke="white" stroke-width="2" stroke-dasharray="10,5" opacity="0.4" />
                        <circle cx="100" cy="100" r="5" fill="#ffb690" />
                        <circle cx="700" cy="700" r="5" fill="#ffb690" />
                    </svg>
                </div>
            </div>
            <div class="map-sidebar">
                <div class="flex items-center gap-3 border-b border-white/10 pb-4">
                    <span class="material-symbols-outlined text-secondary">explore</span>
                    <h1 id="f0" class="text-4xl font-black italic tracking-tighter uppercase">MAP OVERVIEW</h1>
                </div>
                
                <div class="flex flex-col gap-8 mt-4">
                    <div>
                        <span class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">CURRENT MAP</span>
                        <h2 id="f1" class="text-6xl font-black uppercase text-primary">ERANGEL</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 flex flex-col">
                            <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">WEATHER</span>
                            <span id="f2" class="text-2xl font-bold uppercase">CLEAR SKY</span>
                        </div>
                        <div class="bg-white/5 p-4 flex flex-col">
                            <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">E-PORTAL</span>
                            <span id="f3" class="text-2xl font-bold uppercase">ACTIVE</span>
                        </div>
                    </div>

                    <div class="mt-auto border-t border-white/10 pt-6">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">MATCH PROGRESS</span>
                            <span id="progress-text" class="text-xs font-bold text-secondary">0%</span>
                        </div>
                        <div class="w-full h-1 bg-white/10">
                            <div id="progress-bar" class="w-0 h-full bg-secondary transition-all duration-1000"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sheetInterval = null;
        let progressInterval = null;
        let matchStartTimeObj = null;
        const FULL_MATCH_SECONDS = 1920; // Approx 32 mins normal PUBG match duration

        async function fetchSheet(url) {
            try {
                let cleanUrl = url.trim();
                if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
                if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

                const response = await fetch(cleanUrl);
                const csvText = await response.text();
                if (csvText.includes('<!DOCTYPE html>')) return;

                Papa.parse(csvText, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        const rawLines = results.data;
                        if (rawLines.length < 1) return;

                        const headerCols = rawLines[0];
                        if (headerCols.length > 9) {
                             setStartTime(headerCols[9]); // J1 cell
                        }

                        if (rawLines.length > 32) {
                            const selectRow = rawLines[32];
                            const b33Value = parseInt(selectRow[1]?.trim());
                            if (!isNaN(b33Value) && b33Value >= 1 && b33Value <= 7) {
                                const mapsRow = rawLines[31];
                                const mapName = mapsRow[b33Value]?.trim();
                                if (mapName) {
                                    const nameStr = mapName.toUpperCase();
                                    document.getElementById('f1').innerText = nameStr;
                                    document.getElementById('map-asset').src = `images/maps/${nameStr.toLowerCase()}.jpeg`;
                                }
                            }
                        }
                    }
                });
            } catch (e) {
                console.error("Auto Sync Error:", e);
            }
        }

        function setStartTime(j1Value) {
            if (!j1Value || j1Value.trim() === '') return;
            let timeStr = j1Value.trim();
            let isPM = timeStr.toUpperCase().includes('PM');
            let isAM = timeStr.toUpperCase().includes('AM');
            
            timeStr = timeStr.replace(/[A-Za-z]/g, '').trim();
            let parts = timeStr.split(':');
            let hours = parseInt(parts[0]) || 0;
            let minutes = parseInt(parts[1]) || 0;
            let seconds = parseInt(parts[2]) || 0;

            if (isPM && hours < 12) hours += 12;
            if (isAM && hours === 12) hours = 0;

            let now = new Date();
            let st = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, seconds);
            if (st.getTime() > now.getTime() + 60000) {
                 st.setDate(st.getDate() - 1); 
            }
            matchStartTimeObj = st;
        }

        function updateProgress() {
            if (!matchStartTimeObj) return;
            const now = new Date();
            let elapsedSec = Math.floor((now - matchStartTimeObj) / 1000);
            if (elapsedSec < 0) elapsedSec = 0;
            
            let percent = (elapsedSec / FULL_MATCH_SECONDS) * 100;
            if (percent > 100) percent = 100;
            
            const pctStr = Math.floor(percent) + '%';
            document.getElementById('progress-text').innerText = pctStr;
            document.getElementById('progress-bar').style.width = pctStr;
        }

        function update(rawData) {
            try {
                let data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
                
                if (data.f7 && data.f7.startsWith('http')) {
                    if (sheetInterval) clearInterval(sheetInterval);
                    if (progressInterval) clearInterval(progressInterval);
                    
                    fetchSheet(data.f7);
                    sheetInterval = setInterval(() => fetchSheet(data.f7), 10000);
                    progressInterval = setInterval(updateProgress, 1000);
                } else {
                    if (data.f1) {
                        const mapName = data.f1.toUpperCase();
                        document.getElementById('f1').innerText = mapName;
                        let m = mapName.toLowerCase();
                        document.getElementById('map-asset').src = `images/maps/${m}.jpeg`;
                    }
                }
                
                if (data.f2) document.getElementById('f2').innerText = data.f2.toUpperCase();
                if (data.f3) document.getElementById('f3').innerText = data.f3.toUpperCase();
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        function play() {
            document.getElementById('wrapper').style.opacity = '1';
        }

        function stop() {
            document.getElementById('wrapper').style.opacity = '0';
        }

        window.SPXGCTemplateDefinition = {
            "description": "PUBGM Map Overview Overlay",
            "playserver": "OVERLAY",
            "playchannel": "1",
            "playlayer": "6",
            "webplayout": "6",
            "out": "manual",
            "dataformat": "json",
            "uicolor": "9",
            "DataFields": [
                { "field": "f7", "ftype": "textfield", "title": "Spreadsheet URL (Auto Mode)", "value": "" },
                { "field": "f0", "ftype": "textfield", "title": "Heading", "value": "MAP OVERVIEW" },
                { "field": "f1", "ftype": "textfield", "title": "Map Name (Manual Override)", "value": "ERANGEL" },
                { "field": "f2", "ftype": "textfield", "title": "Weather", "value": "Clear Sky" },
                { "field": "f3", "ftype": "textfield", "title": "Special Status", "value": "Active" }
            ]
        };
    </script>
</body>
</html>
