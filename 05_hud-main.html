<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SPX - Dynamic Tactical HUD</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="uni_mapper.js"></script>
  <script id="tailwind-config">
    tailwind.config = {

      theme: {

            "outline": "#8c909f",

            "on-secondary-container": "#4a1c00",
            "tertiary-fixed": "#e0e3e5",
            "surface-dim": "#0b1326",
            "on-error": "#690005",
            "on-background": "#dae2fd",
            "secondary-fixed-dim": "#ffb690",
            "on-secondary": "#552100",
            "tertiary": "#c4c7c9",
            "on-error-container": "#ffdad6",
            "secondary-container": "#ec6a06",
            "on-tertiary-fixed-variant": "#444749",
            "surface-container-highest": "#2d3449",
            "on-tertiary": "#2d3133",
            "on-primary-container": "#00285d",
            "inverse-surface": "#dae2fd",
            "error-container": "#93000a",
            "surface-container-lowest": "#060e20",
            "on-secondary-fixed-variant": "#783200",
            "surface-tint": "#adc6ff",
            "on-primary-fixed-variant": "#004395",
            "inverse-on-surface": "#283044",
            "on-primary": "#002e6a",
            "surface": "#0b1326",
            "outline-variant": "#424754",
            "surface-variant": "#2d3449",
            "tertiary-container": "#8e9193",
            "surface-container-low": "#131b2e",
            "primary-container": "#4d8eff",
            "inverse-primary": "#005ac2",
            "surface-bright": "#31394d",
            "on-primary-fixed": "#001a42",
            "primary-fixed": "#d8e2ff",
            "tertiary-fixed-dim": "#c4c7c9",
            "secondary-fixed": "#ffdbca",
            "primary": "#adc6ff",
            "on-secondary-fixed": "#341100",
            "background": "#0b1326",
            "on-surface": "#dae2fd",
            "on-surface-variant": "#c2c6d6",

          },

            "body": ["Inter"],

  <style>
    .hud-glass {
      background-color: rgba(11, 19, 38, 0.9);
      backdrop-filter: blur(12px);
    }

    body {
      background-color: transparent;
      margin: 0;
      overflow: hidden;
      width: 1920px;
      height: 1080px;
    }

    #wrapper {
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .animate-in {
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    ::view-transition-group(*) {
      animation-duration: 0.6s;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }
  </style>
</head>

<body class="bg-transparent text-on-surface font-body">
  <div id="wrapper">
    <div id="leaderboard" class="absolute top-12 left-12 w-80 flex flex-col gap-0 shadow-2xl">
      <!-- HEADER -->
      <div class="hud-glass border-l-4 border-primary p-4 mb-1">
        <div class="text-primary font-black italic text-[9px] tracking-widest uppercase mb-1 flex items-center gap-2">
          LIVE BROADCAST FEED</div>
        <h1 id="f0" class="text-2xl font-black text-on-surface tracking-tighter leading-none uppercase truncate">
          LEADERBOARD</h1>
        <div class="flex justify-between items-end mt-2">
          <span id="f1"
            class="bg-primary text-black px-2 py-0.5 text-[10px] font-bold tracking-widest uppercase truncate max-w-[120px]">PHASE
            5</span>
          <span id="alive-counter"
            class="text-gray-400 text-[10px] font-bold uppercase tracking-widest tabular-nums font-mono tracking-tighter">ALIVE:
            0/0</span>
        </div>
      </div>
      <!-- HEADERS -->
      <div
        class="grid grid-cols-[40px_1fr_48px] items-center px-4 py-1.5 bg-black/40 text-[9px] font-black tracking-widest text-gray-500 uppercase border-b border-white/5">
        <div>SLOT</div>
        <div class="pl-8 text-center uppercase">TEAM / STATUS</div>
        <div class="text-right uppercase">PTS</div>
      </div>
      <div id="leaderboard-rows" class="flex flex-col gap-[2px]"></div>
      <!-- FOOTER -->
      <div
        class="mt-1 hud-glass border-t border-white/10 p-3 flex justify-between items-center bg-gradient-to-r from-transparent to-black/10">
        <span class="text-[10px] font-black uppercase text-gray-500 tracking-tighter">NEXT ZONE TIMER:</span>
        <span id="f3" class="text-secondary font-black tabular-nums border-b border-secondary/20">00:00</span>
      </div>
    </div>
  </div>

  <script>
    let sheetInterval = null;
    let timerInterval = null;
    let currentSeconds = 0;
    let timerRunning = false;
    let lastTimeStr = "";

    function updateTimerDisplay() {
      if (currentSeconds <= 0) {
        document.getElementById('f3').innerText = "00:00";
        return;
      }
      const m = Math.floor(currentSeconds / 60).toString().padStart(2, '0');
      const s = (currentSeconds % 60).toString().padStart(2, '0');
      document.getElementById('f3').innerText = `${m}:${s}`;
    }

    function setTimer(timeStr) {
      if (!timeStr) return;
      if (timeStr === lastTimeStr) return;
      
      const match = timeStr.match(/(\d{1,2}):(\d{2})/);
      if (match) {
        lastTimeStr = timeStr;
        const newSecs = parseInt(match[1]) * 60 + parseInt(match[2]);
        
        if (Math.abs(newSecs - currentSeconds) > 3) {
           currentSeconds = newSecs;
           timerRunning = true;
           updateTimerDisplay();
           
           if (!timerInterval) {
             timerInterval = setInterval(() => {
               if (timerRunning && currentSeconds > 0) {
                 currentSeconds--;
                 updateTimerDisplay();
               }
             }, 1000);
           }
        }
      }
    }

    async function fetchSheet(url) {
      try {
        let cleanUrl = url.trim();
        if (cleanUrl.includes('/edit')) cleanUrl = cleanUrl.replace(/\/edit.*$/, '/export?format=csv&gid=0');
        if (cleanUrl.includes('pub?')) cleanUrl = cleanUrl.replace('output=html', 'output=csv');

        const response = await fetch(cleanUrl);
        const csvText = await response.text();
        if (csvText.includes('<!DOCTYPE html>')) return;
        
        Papa.parse(csvText, {
            skipEmptyLines: true,
            complete: function(results) {
                const lines = results.data;
                if (lines.length < 2) return;

                let totalAlive = 0;
                let totalParticipating = 0;
                let rawTime = "";

                lines.forEach(cols => {
                  cols.forEach(col => { if (col && col.includes(':') && !rawTime) rawTime = col.trim(); });
                });

                const allParsedRows = lines.slice(2, 27).map(cols => {
                  if (!cols[1] || cols[1].trim() === "" || cols[1].trim() === "TeamName") return null;

                  const pips = [
                    cols[4]?.trim().toUpperCase() === 'TRUE', cols[5]?.trim().toUpperCase() === 'TRUE',
                    cols[6]?.trim().toUpperCase() === 'TRUE', cols[7]?.trim().toUpperCase() === 'TRUE'
                  ];

                  const aliveCount = pips.filter(p => p).length;
                  totalAlive += aliveCount;
                  totalParticipating += 4;

                  return {
                    slot: cols[0]?.trim() || '0', name: cols[1]?.trim() || '', logo: cols[2]?.trim() || '',
                    pts: parseInt(cols[10]?.trim()) || 0,
                    rank: cols[9]?.trim() || '',
                    players: pips,
                    isAlive: aliveCount > 0
                  };
                }).filter(r => r !== null);

                document.getElementById('alive-counter').innerText = `ALIVE: ${totalAlive}/${totalParticipating}`;

                if (rawTime) {
                  setTimer(rawTime);
                }

                const runUpdates = () => {
                  // SEPARATION LOGIC
                  const aliveTeams = allParsedRows.filter(r => r.isAlive);
                  aliveTeams.sort((a, b) => {
                    const rA = parseInt(a.rank) || 999;
                    const rB = parseInt(b.rank) || 999;
                    if (rA !== rB) return rA - rB;
                    
                    const ptsA = parseInt(a.pts) || 0;
                    const ptsB = parseInt(b.pts) || 0;
                    if (ptsA !== ptsB) return ptsB - ptsA;

                    return parseInt(a.slot) - parseInt(b.slot);
                  });

                  const deadTeams = allParsedRows.filter(r => !r.isAlive);
                  deadTeams.sort((a, b) => b.pts - a.pts); // Highest score first

                  // COMBINE: Fill gaps with dead teams
                  let finalRows = [...aliveTeams];
                  if (finalRows.length < 10) {
                    const needed = 10 - finalRows.length;
                    finalRows = finalRows.concat(deadTeams.slice(0, needed));
                  }

                  renderRows(finalRows.slice(0, 10));
                };

                if (document.startViewTransition) {
                  document.startViewTransition(() => runUpdates());
                } else {
                  runUpdates();
                }
            }
        });
      } catch (e) { console.error("Sync Error:", e); }
    }

    function renderRows(rows) {
      const container = document.getElementById('leaderboard-rows');
      const existingNodes = Array.from(container.children);
      const nodeMap = new Map();
      existingNodes.forEach(node => nodeMap.set(node.dataset.id, node));

      rows.forEach((row, i) => {
        let pips = '';
        row.players.forEach(alive => pips += `<div class="w-1.5 h-1.5 ${alive ? 'bg-primary' : 'bg-white/10'} transition-colors duration-300"></div>`);
        const displayId = (row.rank && row.rank !== '') ? row.rank : row.slot;

        // Use Secondary color (Orange) for dead teams
        const borderColor = row.isAlive ? (i == 0 ? 'border-primary' : 'border-primary/30') : 'border-secondary/40';
        const rankColor = row.isAlive ? 'text-primary' : 'text-secondary/60';
        const ptsColor = row.isAlive ? 'text-secondary font-black' : 'text-secondary/50 font-bold';
        
        const safeId = (row.name || '').replace(/[^a-zA-Z0-9]/g, '_') + '_' + row.slot;
        let node = nodeMap.get(safeId);
        
        const uniLogoPath = window.getUniLogo ? window.getUniLogo(row.name) : null;
        const cleanName = window.cleanTeamName ? window.cleanTeamName(row.name) : row.name;
        const uniImgTag = uniLogoPath ? `<img class="w-4 h-4 object-contain transition-opacity duration-300 mr-[-6px]" src="${uniLogoPath}" onerror="this.style.display='none'">` : '';

        const innerContent = `
            <div class="${rankColor} font-black text-xs italic transition-colors duration-300">#${displayId}</div>
            <div class="flex items-center gap-3">
              ${uniImgTag}
              <img class="w-6 h-6 object-contain transition-opacity duration-300" src="team_logos/${row.logo}.png" onerror="this.style.opacity=${row.isAlive ? 1 : 0.4}">
              <div class="flex flex-col gap-0 w-[120px]">
                <span class="text-[11px] font-black uppercase ${row.isAlive ? 'text-on-surface' : 'text-gray-500'} tracking-tighter leading-none transition-colors duration-300 truncate" title="${cleanName}">${cleanName}</span>
                <div class="flex gap-1 mt-1">${pips}</div>
              </div>
            </div>
            <div class="text-right text-sm tabular-nums ${ptsColor} transition-colors duration-300">${row.pts}</div>
        `;

        const className = `hud-glass grid grid-cols-[40px_1fr_48px] items-center px-4 py-3 border-l-2 ${borderColor} border-b border-white/5 transition-all duration-500`;

        if (!node) {
          node = document.createElement('div');
          node.dataset.id = safeId;
          node.style.viewTransitionName = `team_${safeId}`;
          node.className = className;
          node.innerHTML = innerContent;
        } else {
          const oldPts = node.dataset.pts;
          if (oldPts && oldPts !== row.pts.toString()) {
            node.classList.add('bg-white/10');
            setTimeout(() => node.classList.remove('bg-white/10'), 600);
          }
          if (node.innerHTML !== innerContent) node.innerHTML = innerContent;
          if (node.className !== className) node.className = className;
          nodeMap.delete(safeId);
        }
        node.dataset.pts = row.pts;

        if (container.children[i] !== node) {
          container.insertBefore(node, container.children[i]);
        }
      });

      nodeMap.forEach(node => node.remove());
    }

    function update(rawData) {
      const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
      if (data.f0) document.getElementById('f0').innerText = data.f0.toUpperCase();
      if (data.f1) document.getElementById('f1').innerText = data.f1.toUpperCase();
      if (data.f3 && !data.f5) setTimer(data.f3);

      if (data.f5 && data.f5.startsWith('http')) {
        if (sheetInterval) clearInterval(sheetInterval);
        fetchSheet(data.f5);
        sheetInterval = setInterval(() => fetchSheet(data.f5), 3500);
      }
    }

    function play() {
      document.getElementById('wrapper').style.opacity = '1';
      document.getElementById('leaderboard').classList.add('animate-in');
    }
    function stop() { document.getElementById('wrapper').style.opacity = '0'; }

    window.SPXGCTemplateDefinition = {
      "description": "Dynamic HUD - Full Board Guarantee",
      "playserver": "OVERLAY", "playchannel": "1", "playlayer": "5", "webplayout": "5",
      "out": "manual", "uicolor": "2",
      "DataFields": [
        { "field": "f5", "ftype": "textfield", "title": "Spreadsheet URL", "value": "" },
        { "field": "f0", "ftype": "textfield", "title": "Main Title", "value": "LIVE LEADERBOARD" },
        { "field": "f1", "ftype": "textfield", "title": "Phase Info", "value": "PHASE 5" },
        { "field": "f3", "ftype": "textfield", "title": "Manual Time", "value": "00:00" }
      ]
    };
  </script>
</body>

</html>
